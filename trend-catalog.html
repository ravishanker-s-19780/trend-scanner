<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Trend Catalog — B2B Ladies Nighty Trends</title>
<style>
/* ── Variables ──────────────────────────────────── */
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e8e8e8;
  --text: #111111;
  --text-muted: #666666;
  --text-light: #999999;
  --accent: #e91e63;
  --accent-dark: #c2185b;
  --accent-light: #fce4ec;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.16);
  --header-h: 56px;
  --bottom-nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Decision colors */
  --send-now: #16a34a;
  --send-now-bg: #dcfce7;
  --backup: #2563eb;
  --backup-bg: #dbeafe;
  --needs-evidence: #d97706;
  --needs-evidence-bg: #fef3c7;
  --do-not-send: #dc2626;
  --do-not-send-bg: #fee2e2;
}

/* ── Reset ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ── Accessibility ──────────────────────────────── */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border-width: 0;
}

/* ── Loading screen ─────────────────────────────── */
#loader {
  position: fixed; inset: 0;
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
}
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { color: var(--text-muted); font-size: 14px; font-weight: 500; }
#loader.hidden { display: none; }

/* ── Header ─────────────────────────────────────── */
header {
  position: sticky;
  top: 0; z-index: 100;
  height: var(--header-h);
  background: rgba(255,255,255,.92);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  height: 100%;
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 16px; letter-spacing: -.02em; flex-shrink: 0;
}
.brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #9c27b0);
  display: grid; place-items: center;
  font-size: 15px;
}
.header-tabs {
  display: flex; gap: 4px;
  background: var(--bg);
  border-radius: 999px;
  padding: 3px;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px; font-weight: 600;
  color: var(--text-muted);
  transition: all .15s ease;
  position: relative;
  white-space: nowrap;
}
.tab-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.wishlist-badge {
  display: none;
  position: absolute; top: -2px; right: -2px;
  background: var(--accent);
  color: white;
  font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px;
  border-radius: 999px; padding: 0 4px;
  align-items: center; justify-content: center;
  border: 2px solid var(--surface);
}
.wishlist-badge.visible { display: flex; }
.header-count {
  font-size: 12px; color: var(--text-muted); font-weight: 500; flex-shrink: 0;
}


/* ── Main / Grid ────────────────────────────────── */
main {
  max-width: 1200px; margin: 0 auto;
  padding: 12px 10px calc(var(--bottom-nav-h) + var(--safe-bottom) + 20px);
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (min-width: 480px) {
  .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
}
@media (min-width: 768px) {
  main { padding: 16px 16px 80px; }
  .grid { grid-template-columns: repeat(4, 1fr); gap: 14px; }
}
@media (min-width: 1024px) {
  .grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
}

/* ── Trend Card ─────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  cursor: pointer;
  position: relative;
  display: flex; flex-direction: column;
}
.card:active { transform: scale(0.97); }
.card.disliked { opacity: 0.45; }
@media (hover: hover) {
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
}

/* Hero image */
.collage {
  position: relative;
  overflow: hidden;
  background: #f0f0f0;
  aspect-ratio: 2/3;
}
.hero-img {
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center top;
  transition: transform .5s ease;
  display: block;
  background: #f9f6f2;
}
.card:hover .hero-img { transform: scale(1.04); }
.hero-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #f5f0ff, #fce4ec);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}

/* Photos badge (desktop grid) */
.photos-badge {
  position: absolute; bottom: 36px; right: 8px; z-index: 5;
  background: rgba(0,0,0,.5);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  color: white; font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
}
@media (max-width: 767px) { .photos-badge { display: none; } }

/* Image dots indicator */
.img-dots {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; z-index: 5;
}
.img-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,.5);
  transition: background .2s;
}
.img-dot.active { background: white; }

/* Overlays on collage */
.rank-badge {
  position: absolute; top: 8px; left: 8px; z-index: 5;
  background: rgba(0,0,0,.6);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  color: white;
  font-size: 10px; font-weight: 700;
  padding: 3px 7px; border-radius: 999px;
  letter-spacing: .02em;
}
.decision-badge {
  position: absolute; top: 8px; right: 8px; z-index: 5;
  font-size: 9px; font-weight: 800;
  padding: 3px 7px; border-radius: 999px;
  letter-spacing: .04em; text-transform: uppercase;
}
.decision-badge.send-now { background: var(--send-now-bg); color: var(--send-now); }
.decision-badge.backup { background: var(--backup-bg); color: var(--backup); }
.decision-badge.needs-evidence { background: var(--needs-evidence-bg); color: var(--needs-evidence); }
.decision-badge.do-not-send { background: var(--do-not-send-bg); color: var(--do-not-send); }

/* Color DNA strip */
.color-strip {
  display: flex; height: 4px;
  overflow: hidden;
}
.color-strip span { flex: 1; }

/* Card body */
.card-body {
  padding: 10px 10px 8px;
  display: flex; flex-direction: column; gap: 5px;
  flex: 1;
}
.card-title {
  font-size: 12px; font-weight: 700;
  line-height: 1.35; letter-spacing: -.01em;
  color: var(--text);
}
@media (min-width: 480px) { .card-title { font-size: 13px; } }

.card-meta {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.card-rating {
  display: flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600; color: #f59e0b;
}
.card-price {
  font-size: 11px; font-weight: 600; color: var(--text);
}
.card-count {
  font-size: 10px; color: var(--text-muted); margin-left: auto;
}

/* Platform dots */
.platform-dots {
  display: flex; gap: 3px; flex-wrap: wrap; align-items: center;
}
.platform-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  title: attr(data-platform);
}


/* Action row */
.action-row {
  display: flex; align-items: center;
  gap: 4px;
  padding: 6px 10px 8px;
  border-top: 1px solid var(--border);
}
.action-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  transition: all .15s ease;
  min-height: 34px;
}
.action-btn:hover, .action-btn:active { background: var(--bg); }
.action-btn.liked { color: var(--accent); }
.action-btn.wishlisted { color: #7c3aed; }
.action-btn.disliked-state { color: var(--text-muted); }
.action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.action-btn.liked svg.heart-icon { fill: var(--accent); stroke: var(--accent); }
.action-btn.wishlisted svg.bookmark-icon { fill: #7c3aed; stroke: #7c3aed; }

/* Like animation */
@keyframes heartPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.5); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); }
}
.heart-pop { animation: heartPop .35s ease forwards; }

/* ── Empty state ────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted); display: none;
}
.empty-state.visible { display: block; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 14px; }

/* ── Bottom Nav (mobile) ────────────────────────── */
.bottom-nav {
  display: flex;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(255,255,255,.95);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  z-index: 80;
}
@media (min-width: 768px) { .bottom-nav { display: none; } }
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  transition: color .15s ease;
  position: relative;
}
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { width: 22px; height: 22px; }
.bottom-nav-badge {
  display: none;
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: var(--accent); color: white;
  font-size: 9px; font-weight: 800;
  min-width: 16px; height: 16px;
  border-radius: 999px; padding: 0 3px;
  align-items: center; justify-content: center;
  border: 2px solid var(--surface);
}
.bottom-nav-badge.visible { display: flex; }

/* ── Scroll to top ──────────────────────────────── */
#scrollTop {
  position: fixed; right: 16px;
  bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--text);
  color: white;
  display: none; place-items: center;
  box-shadow: var(--shadow-md);
  z-index: 75; transition: opacity .2s ease;
}
#scrollTop.visible { display: grid; }
@media (min-width: 768px) {
  #scrollTop { bottom: 24px; }
}


/* ════════════════════════════════════════════════
   MOBILE: Full-screen vertical snap-scroll feed
   ════════════════════════════════════════════════ */
@media (max-width: 767px) {
  /* Lock body scroll — only the feed scrolls */
  body { overflow: hidden; height: 100dvh; }

  /* Feed container: fixed, fills between header and bottom nav */
  main {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    bottom: calc(var(--bottom-nav-h) + var(--safe-bottom));
    padding: 0;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    overscroll-behavior-y: none;
  }

  .grid {
    display: block;
    gap: 0;
  }

  /* Each card = one full screen */
  .card {
    scroll-snap-align: start;
    height: calc(100dvh - var(--header-h) - var(--bottom-nav-h) - var(--safe-bottom));
    border-radius: 0;
    box-shadow: none;
    border: none;
    position: relative;
    overflow: hidden;
    transform: none !important;
  }
  .card:active { transform: none !important; }

  /* Image fills entire card */
  .collage {
    position: absolute;
    inset: 0;
    aspect-ratio: unset;
    z-index: 0;
  }

  /* Bottom gradient for readability */
  .collage::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,.80) 0%,
      rgba(0,0,0,.40) 35%,
      rgba(0,0,0,.10) 60%,
      transparent 80%
    );
    z-index: 2;
    pointer-events: none;
  }

  .hero-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* Rank badge: stay top-left */
  .rank-badge { z-index: 5; }

  /* Decision badge: stay top-right */
  .decision-badge { z-index: 5; }

  /* Dots: above gradient */
  .img-dots { z-index: 5; bottom: 12px; }

  /* Color DNA strip: pinned at very bottom */
  .color-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    z-index: 6;
  }

  /* Info panel: bottom-left overlay on image */
  .card-body {
    position: absolute;
    bottom: 5px; left: 0;
    right: 72px; /* leave space for right FABs */
    z-index: 5;
    padding: 14px 16px 20px;
    gap: 6px;
    background: none;
    flex: unset;
  }

  .card-title {
    color: white;
    font-size: 16px;
    font-weight: 800;
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
    line-height: 1.25;
  }

  .card-meta { gap: 8px; }
  .card-rating { color: #fbbf24; font-size: 13px; font-weight: 700; }
  .card-price { color: white; font-size: 13px; font-weight: 700; }
  .card-count { color: rgba(255,255,255,.7); font-size: 11px; margin-left: 0; }


  .platform-dots .platform-dot {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(255,255,255,.5);
  }

  /* Right-side action FABs: TikTok/Reels style */
  .action-row {
    position: absolute;
    right: 12px;
    bottom: 40px;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border: none;
    padding: 0;
    z-index: 5;
    background: none;
  }

  .action-btn {
    flex: unset;
    flex-direction: column;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(0,0,0,.35);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 10px;
    font-weight: 700;
    gap: 3px;
    padding: 0;
    border: 1.5px solid rgba(255,255,255,.2);
    min-height: unset;
    justify-content: center;
  }
  .action-btn svg { width: 20px; height: 20px; }
  .action-btn:hover, .action-btn:active {
    background: rgba(0,0,0,.55);
  }
  .action-btn.liked {
    background: rgba(233,30,99,.55);
    border-color: var(--accent);
    color: white;
  }
  .action-btn.liked svg.heart-icon { fill: white; stroke: white; }
  .action-btn.wishlisted {
    background: rgba(124,58,237,.55);
    border-color: #7c3aed;
    color: white;
  }
  .action-btn.wishlisted svg.bookmark-icon { fill: white; stroke: white; }

  /* Icons only — hide text labels */
  .action-btn .btn-label { display: none; }

  /* Swipe hint on first card */
  .swipe-hint {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: rgba(255,255,255,.7);
    font-size: 11px; font-weight: 600;
    animation: swipeBounce 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  .swipe-hint svg { width: 20px; height: 20px; }
  @keyframes swipeBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: .7; }
    50% { transform: translateX(-50%) translateY(-6px); opacity: 1; }
  }

  /* Hide scroll-to-top on mobile (feed handles navigation) */
  #scrollTop { display: none !important; }

  /* Mobile tag margin override */
  .card-tags { margin: 4px 0 6px; }
}

/* Product attribute tags (all screen sizes) */
.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin: 3px 0 4px;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.tag-fabric  { background: #f3f4f6; color: #374151; }
.tag-size    { background: #eff6ff; color: #1d4ed8; }
.tag-nursing { background: #fdf2f8; color: #be185d; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading top products…</div>
</div>

<!-- Header -->
<h1 class="sr-only">TrendBoard: B2B Ladies Nighty Trends</h1>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">👗</div>
      <span>TrendBoard</span>
    </div>
    <div class="header-tabs">
      <button class="tab-btn active" data-tab="discover" onclick="switchTab('discover')">Discover</button>
      <button class="tab-btn" data-tab="wishlist" onclick="switchTab('wishlist')">
        Shortlist
        <span class="wishlist-badge" id="headerWishlistBadge"></span>
      </button>
    </div>
    <div class="header-count" id="headerCount"></div>
  </div>
</header>


<!-- Main grid -->
<main>
  <div class="grid" id="trendGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <div class="empty-title">No trends found</div>
    <div class="empty-sub">Try a different filter combination</div>
  </div>
</main>

<!-- Bottom nav (mobile) -->
<nav class="bottom-nav">
  <button class="bottom-nav-item active" data-tab="discover" onclick="switchTab('discover')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Discover
  </button>
  <button class="bottom-nav-item" data-tab="wishlist" onclick="switchTab('wishlist')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    Shortlist
    <span class="bottom-nav-badge" id="bottomWishlistBadge"></span>
  </button>
  <button class="bottom-nav-item" onclick="exportWishlist()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Shortlist
  </button>
</nav>

<!-- Scroll to top -->
<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>


<script>
// ── Constants ──────────────────────────────────────────────────
const PLATFORM_COLORS = {
  amazon:   '#FF9900',
  myntra:   '#FF3F6C',
  meesho:   '#9B2335',
  flipkart: '#2874F0',
  ajio:     '#F28A2E',
  clovia:   '#E91E7A',
  shyaway:  '#8B0000',
  tatacliq: '#942F82',
};

const DECISION_CLASS = {
  'Trending Now':  'send-now',
  'Worth Watching':'backup',
  'Emerging':      'needs-evidence',
  'Niche':         'do-not-send',
};

const DECISION_LABEL = {
  'Trending Now':  '🟢 Buy / Produce Now',
  'Worth Watching':'🔵 Test Small Batch',
  'Emerging':      '🟡 Watch — Needs Evidence',
  'Niche':         '🔴 Do Not Send',
};


const COLOR_MAP = {
  white: '#ffffff', cream: '#FFFDD0', peach: '#FFCBA4',
  pink: '#FFB6C1', 'light pink': '#FFB6C1', 'hot pink': '#FF69B4',
  red: '#e53935', 'dark red': '#b71c1c', maroon: '#800000',
  blue: '#1565c0', 'light blue': '#64b5f6', 'navy blue': '#001f5b', navy: '#001f5b',
  green: '#2e7d32', 'light green': '#81c784', 'dark green': '#1b5e20',
  yellow: '#f9a825', 'mustard yellow': '#e6a817', mustard: '#e6a817',
  orange: '#ef6c00', purple: '#7b1fa2', lavender: '#9575cd',
  grey: '#9e9e9e', gray: '#9e9e9e', black: '#212121',
  'sky blue': '#87ceeb', teal: '#009688', aqua: '#00bcd4',
  multicolor: 'linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff)',
};

const SCORE_LABELS = [
  ['A', 'Popularity Spread', 'evidence_strength'],
  ['B', 'Buyer Demand',      'demand_volume'],
  ['C', 'Customer Appeal',   'customer_appeal'],
  ['D', 'Easy to Find',      'production_simplicity'],
  ['E', 'Value Score',       'value_score'],
];

// ── State ──────────────────────────────────────────────────────
let allTrends = [];
let activeTab = 'discover';
let activeFilters = { decision: 'all', source: 'all', price: 'all', rating: 'all' };

function getState() {
  return {
    reactions: JSON.parse(localStorage.getItem('trend_reactions') || '{}'),
    wishlist:  JSON.parse(localStorage.getItem('trend_wishlist')  || '[]'),
  };
}
function saveState(s) {
  localStorage.setItem('trend_reactions', JSON.stringify(s.reactions));
  localStorage.setItem('trend_wishlist',  JSON.stringify(s.wishlist));
}

// ── Helpers ────────────────────────────────────────────────────
function fireMeter(score) {
  const n = score >= 20 ? 5 : score >= 15 ? 4 : score >= 10 ? 3 : score >= 5 ? 2 : 1;
  return '🔥'.repeat(n);
}

function topColors(colors, limit = 6) {
  const freq = {};
  colors.forEach(c => {
    const k = (c.primary || '').toLowerCase().trim();
    if (k && k !== 'unknown' && k !== 'none') freq[k] = (freq[k] || 0) + 1;
  });
  return Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit)
    .map(([name]) => name);
}

function colorCss(name) {
  if (!name) return '#e0e0e0';
  const k = name.toLowerCase().trim();
  return COLOR_MAP[k] || '#e0e0e0';
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1).replace(/-/g, ' ');
}

const SLEEVE_LABELS = {
  'half':          'Half Sleeve',
  'full':          'Full Sleeve',
  'sleeveless':    'Sleeveless',
  'three-quarter': '¾ Sleeve',
};

function formatTitle(t) {
  return t.title || capitalize(t.design_pattern) || 'Untitled Product';
}

function dominantNeck(t) {
  if (!t.neck_breakdown || Object.keys(t.neck_breakdown).length === 0) return null;
  return Object.entries(t.neck_breakdown).sort((a, b) => parseInt(b[1]) - parseInt(a[1]))[0][0];
}

function formatSubtitle(t) {
  const source = t.source ? capitalize(t.source) : 'Unknown source';
  const keyword = t.keyword || 'nighty';
  return `${source} · ${keyword}`;
}

function classifyDecision(reviewCount) {
  if (reviewCount >= 10000) return 'Trending Now';
  if (reviewCount >= 3000) return 'Worth Watching';
  if (reviewCount >= 800) return 'Emerging';
  return 'Niche';
}

function decisionAction(decision) {
  if (decision === 'Trending Now') return 'Buy / Produce Now';
  if (decision === 'Worth Watching') return 'Test Small Batch';
  if (decision === 'Emerging') return 'Watch — Needs Evidence';
  return 'Do Not Send';
}

function scoreFromProduct(product) {
  const reviews = product.review_numeric || 0;
  const rating = product.rating_numeric || 0;
  const price = product.price_numeric || 0;

  const evidence = reviews >= 10000 ? 5 : reviews >= 5000 ? 4 : reviews >= 2000 ? 3 : reviews >= 500 ? 2 : 1;
  const demand = reviews >= 12000 ? 5 : reviews >= 7000 ? 4 : reviews >= 3000 ? 3 : reviews >= 1000 ? 2 : 1;
  const appeal = rating >= 4.3 ? 5 : rating >= 4.0 ? 4 : rating >= 3.7 ? 3 : rating >= 3.4 ? 2 : 1;
  const production = 4;
  const value = price > 0 && price <= 450 ? 5 : price <= 700 ? 4 : price <= 1000 ? 3 : price <= 1400 ? 2 : 1;

  const total = evidence + demand + appeal + production + value;

  return {
    total,
    evidence_strength: evidence,
    demand_volume: demand,
    customer_appeal: appeal,
    production_simplicity: production,
    value_score: value,
    capped: false
  };
}

// ── Data loading ───────────────────────────────────────────────
async function loadData() {
  const products = await fetch('evidence/output/top-50-products-by-reviews.json').then(r => r.json());

  return products.map((product, index) => {
    const decision = classifyDecision(product.review_numeric || 0);
    const score = scoreFromProduct(product);
    const platform = (product.source || '').toLowerCase();

    return {
      rank: product.rank || index + 1,
      cluster_key: product.url || `${platform}-${product.rank || index + 1}`,
      title: product.title || '',
      source: platform,
      keyword: product.keyword || '',
      url: product.url || '',
      image: product.image || '',
      decision,
      recommended_action: decisionAction(decision),
      design_pattern: product.keyword || 'nighty',
      sleeve_length: 'half',
      neck_breakdown: {},
      front_top_treatment: 'print',
      keyword_count: 1,
      product_count: 1,
      sources: platform ? { [platform]: 1 } : {},
      avg_rating: typeof product.rating_numeric === 'number' ? product.rating_numeric : null,
      avg_price: typeof product.price_numeric === 'number' ? product.price_numeric : null,
      min_price: typeof product.price_numeric === 'number' ? product.price_numeric : null,
      max_price: typeof product.price_numeric === 'number' ? product.price_numeric : null,
      review_numeric: product.review_numeric || 0,
      colors: [],
      top_fabrics: [],
      has_plus_sizes: false,
      nursing_count: 0,
      confidence_tier: 'High',
      confidence_pct: 100,
      test_quantity: '20-50 pcs',
      margin_tier: 'Moderate (25-40%)',
      season_fit: 'Year-round',
      buyer_segment: ['Mass market', 'Value buyers'],
      risk_flags: [],
      score,
      images: product.image ? [product.image] : [],
      sampleProducts: [
        {
          source: product.source || '',
          title: product.title || '',
          url: product.url || '',
          image: product.image || ''
        }
      ]
    };
  });
}

// ── Render ─────────────────────────────────────────────────────
function heroImageHTML(images) {
  if (images.length === 0) {
    return `<div class="hero-placeholder">👗</div>`;
  }
  const dots = images.length > 1
    ? `<div class="img-dots">${images.map((_, i) =>
        `<span class="img-dot${i === 0 ? ' active' : ''}"></span>`
      ).join('')}</div>`
    : '';
  return `<img class="hero-img" src="${images[0]}" alt="Product" loading="lazy"
    onerror="this.outerHTML='<div class=\\'hero-placeholder\\'>👗</div>'"/>
    ${dots}`;
}

// Track current image index per card for swipe navigation
const cardImgIndex = {};

function renderCard(t, state) {
  const dc = DECISION_CLASS[t.decision] || 'do-not-send';
  const liked      = state.reactions[t.cluster_key] === 'like';
  const disliked   = state.reactions[t.cluster_key] === 'dislike';
  const wishlisted = state.wishlist.includes(t.cluster_key);

  const colors = topColors(t.colors, 5);
  const colorStrip = colors.map(c => {
    const css = colorCss(c);
    const bg = css.startsWith('linear') ? `background:${css}` : `background-color:${css}`;
    return `<span style="${bg}"></span>`;
  }).join('');

  const platformDots = Object.entries(t.sources).map(([p]) => {
    const col = PLATFORM_COLORS[p] || '#999';
    return `<span class="platform-dot" style="background:${col}" title="${p}"></span>`;
  }).join('');

  const ratingStr     = t.avg_rating ? t.avg_rating.toFixed(1) : '';
  const priceStr      = t.min_price  ? `₹${Math.round(t.min_price)}` : '';
  const decisionLabel = DECISION_LABEL[t.decision] || t.decision;

  // "N photos" badge on image (desktop only; mobile uses dots)
  const swipeHint = t.images.length > 1
    ? `<span class="photos-badge">${t.images.length} photos</span>`
    : '';

  // Swipe-up hint on very first card (mobile)
  const swipeUpHint = t.rank === 1
    ? `<div class="swipe-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        Swipe up
       </div>`
    : '';

  // Build product attribute tags (fabric, size, nursing)
  const topFabric = t.top_fabrics && t.top_fabrics.length > 0
    ? t.top_fabrics[0].replace(/\s*\(\d+\)/, '').trim()
    : null;
  const fabricTag = topFabric
    ? `<span class="tag tag-fabric">${topFabric}</span>`
    : '';

  const neck = dominantNeck(t);
  const neckTag = neck
    ? `<span class="tag tag-fabric">${capitalize(neck)} Neck</span>`
    : '';

  const sizeTag = t.has_plus_sizes
    ? `<span class="tag tag-size">Up to 3XL</span>`
    : '';

  const nursingTag = t.nursing_count > 0
    ? `<span class="tag tag-nursing">Nursing-friendly</span>`
    : '';

  const tagsHTML = (fabricTag || neckTag || sizeTag || nursingTag)
    ? `<div class="card-tags">${fabricTag}${neckTag}${sizeTag}${nursingTag}</div>`
    : '';

  const confidenceTier = t.confidence_tier || 'Unknown';
  const confidenceColor = confidenceTier === 'High' ? '#10b981'
    : confidenceTier === 'Medium' ? '#f59e0b'
    : confidenceTier === 'Low' ? '#f97316'
    : '#ef4444';
  const platformCount = Object.keys(t.sources).length;
  const confidenceRow = `
    <div class="confidence-row" style="display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid #f0f0f0; margin-top: 8px;">
      <span class="confidence-dot" style="width: 8px; height: 8px; border-radius: 50%; background: ${confidenceColor}; flex-shrink: 0;"></span>
      <span class="confidence-label" style="font-size: 12px; color: #666;">${confidenceTier} confidence · ${(t.review_numeric || 0).toLocaleString()} reviews</span>
    </div>
  `;

  return `
  <article class="card${disliked ? ' disliked' : ''}"
    data-key="${t.cluster_key}"
    data-imgidx="0"
    onclick="handleCardClick(event,'${t.cluster_key}')">
    <div class="collage">
      ${heroImageHTML(t.images)}
      ${swipeHint}
      ${swipeUpHint}
      <span class="rank-badge">#${t.rank}</span>
    </div>
    <div class="color-strip">${colorStrip}</div>
    <div class="card-body">
      <h3 class="card-title" style="margin: 0; font-size: 16px; font-weight: 600; line-height: 1.3;">${formatTitle(t)}</h3>
      <div style="margin-top:4px;font-size:12px;color:var(--text-muted)">${formatSubtitle(t)}</div>
      ${tagsHTML}
      <div class="card-meta">
        ${ratingStr ? `<span class="card-rating">⭐ ${ratingStr}</span>` : ''}
        ${priceStr  ? `<span class="card-price">${priceStr}</span>` : ''}
        <span class="card-count">${(t.review_numeric || 0).toLocaleString()} reviews</span>
      </div>
      ${confidenceRow}
    </div>
    <div class="action-row">
      <button class="action-btn${liked ? ' liked' : ''}"
        onclick="toggleLike(event,'${t.cluster_key}')" title="Interested">
        <svg class="heart-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="btn-label">Interested</span>
      </button>
      <button class="action-btn${disliked ? ' disliked-state' : ''}"
        onclick="toggleDislike(event,'${t.cluster_key}')" title="Reject">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span class="btn-label">Reject</span>
      </button>
      <button class="action-btn${wishlisted ? ' wishlisted' : ''}"
        onclick="toggleWishlist(event,'${t.cluster_key}')" title="Shortlist">
        <svg class="bookmark-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="btn-label">Shortlist</span>
      </button>
    </div>
  </article>`;
}

function getFilteredList() {
  const state = getState();
  let list = [...allTrends];

  if (activeTab === 'wishlist') {
    list = list.filter(t => state.wishlist.includes(t.cluster_key));
  } else {
    if (activeFilters.decision !== 'all') {
      list = list.filter(t => t.decision === activeFilters.decision);
    }
    if (activeFilters.source !== 'all') {
      list = list.filter(t => t.source === activeFilters.source);
    }
    if (activeFilters.price !== 'all') {
      list = list.filter(t => {
        const p = t.avg_price;
        if (!p) return activeFilters.price === 'mid';
        if (activeFilters.price === 'budget')  return p < 500;
        if (activeFilters.price === 'mid')     return p >= 500 && p <= 900;
        if (activeFilters.price === 'premium') return p > 900;
        return true;
      });
    }
    if (activeFilters.rating !== 'all') {
      if (activeFilters.rating === 'high') list = list.filter(t => (t.avg_rating || 0) >= 4.0);
    }
  }
  return list;
}

function renderGrid() {
  const state = getState();
  const list = getFilteredList();
  const grid = document.getElementById('trendGrid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('headerCount');

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('visible');
    count.textContent = '';
  } else {
    empty.classList.remove('visible');
    grid.innerHTML = list.map(t => renderCard(t, state)).join('');
    count.textContent = `${list.length} products`;
  }

  updateBadges();
}

// ── Filters & tabs ─────────────────────────────────────────────
function setFilter(type, val, btn) {
  // Update active chip in same group
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(c => {
    c.classList.remove('active');
    // re-apply send-now/backup class for styling
  });
  btn.classList.add('active');
  activeFilters[type] = val;
  renderGrid();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.bottom-nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderGrid();
}

function updateBadges() {
  const { wishlist } = getState();
  const n = wishlist.length;
  const headerBadge = document.getElementById('headerWishlistBadge');
  const bottomBadge = document.getElementById('bottomWishlistBadge');
  if (n > 0) {
    headerBadge.textContent = n; headerBadge.classList.add('visible');
    bottomBadge.textContent = n; bottomBadge.classList.add('visible');
  } else {
    headerBadge.classList.remove('visible');
    bottomBadge.classList.remove('visible');
  }
}

// ── Card interactions ──────────────────────────────────────────
function handleCardClick(e, key) {
  if (e.target.closest('.action-btn')) return;
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;

  // Tap on image area cycles through photos; tap on card body opens modal
  if (e.target.closest('.collage') && t.images.length > 1) {
    const card = e.currentTarget;
    let idx = parseInt(card.dataset.imgidx || '0');
    idx = (idx + 1) % t.images.length;
    card.dataset.imgidx = idx;
    const heroImg = card.querySelector('.hero-img');
    if (heroImg) {
      heroImg.style.opacity = '0';
      heroImg.style.transition = 'opacity .15s';
      setTimeout(() => {
        heroImg.src = t.images[idx];
        heroImg.style.opacity = '1';
      }, 150);
    }
    // Update dots
    card.querySelectorAll('.img-dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });
    return;
  }

}

function toggleLike(e, key) {
  e.stopPropagation();
  const s = getState();
  if (s.reactions[key] === 'like') {
    delete s.reactions[key];
  } else {
    s.reactions[key] = 'like';
  }
  saveState(s);

  // Animate
  const card = document.querySelector(`[data-key="${key}"]`);
  if (card) {
    const heartBtn = card.querySelector('.action-btn:first-child');
    const heartSvg = heartBtn?.querySelector('.heart-icon');
    heartSvg?.classList.add('heart-pop');
    setTimeout(() => heartSvg?.classList.remove('heart-pop'), 400);
  }

  refreshCard(key);
}

function toggleDislike(e, key) {
  e.stopPropagation();
  const s = getState();
  if (s.reactions[key] === 'dislike') {
    delete s.reactions[key];
  } else {
    s.reactions[key] = 'dislike';
  }
  saveState(s);
  refreshCard(key);
}

function toggleWishlist(e, key) {
  if (e) e.stopPropagation();
  const s = getState();
  const idx = s.wishlist.indexOf(key);
  if (idx >= 0) {
    s.wishlist.splice(idx, 1);
  } else {
    s.wishlist.push(key);
  }
  saveState(s);
  refreshCard(key);
  updateBadges();
  // If on wishlist tab and we just removed, re-render
  if (activeTab === 'wishlist') renderGrid();
}

function refreshCard(key) {
  const el = document.querySelector(`[data-key="${key}"]`);
  if (!el) return;
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;
  const state = getState();
  const newCard = document.createElement('div');
  newCard.innerHTML = renderCard(t, state).trim();
  const cardEl = newCard.firstChild;
  el.replaceWith(cardEl);
}


// ── Export ─────────────────────────────────────────────────────
function exportWishlist() {
  const { wishlist, reactions } = getState();
  const items = allTrends.filter(t => wishlist.includes(t.cluster_key)).map(t => ({
    rank: t.rank,
    cluster: t.cluster_key,
    title: formatTitle(t),
    source: t.source,
    url: t.url,
    review_numeric: t.review_numeric,
    decision: t.decision,
    score: t.score.total,
    avg_price: t.avg_price,
    min_price: t.min_price,
    max_price: t.max_price,
    avg_rating: t.avg_rating,
    product_count: t.product_count,
    sources: t.sources,
    reaction: reactions[t.cluster_key] || null,
  }));
  if (items.length === 0) {
    alert('No shortlisted trends yet. Tap 🔖 on cards to shortlist trends.');
    return;
  }

  const format = confirm('Export as JSON (OK) or Text for WhatsApp (Cancel)?') ? 'json' : 'text';
  const today = new Date().toLocaleDateString('en-IN');

  if (format === 'json') {
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `shortlist-${today}.json`;
    a.click(); URL.revokeObjectURL(url);
  } else {
    let text = `📋 SHORTLISTED NIGHTY TRENDS\nGenerated: ${today}\n\n`;
    items.forEach((item, idx) => {
      text += `${idx + 1}. ${item.title}\n`;
      text += `   Source: ${item.source}\n`;
      text += `   Reviews: ${item.review_numeric || 0}\n`;
      text += `   Action: ${item.decision}\n`;
      text += `   Score: ${item.score}/25\n`;
      text += `   Price: ₹${item.min_price || item.avg_price} (avg ₹${item.avg_price})\n`;
      text += `   Rating: ${item.avg_rating ? item.avg_rating.toFixed(1) : 'N/A'} ⭐\n`;
      text += `   Link: ${item.url || 'N/A'}\n\n`;
    });
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `shortlist-${today}.txt`;
    a.click(); URL.revokeObjectURL(url);
  }
}

// ── Scroll to top button ───────────────────────────────────────
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
}, { passive: true });

(async () => {

    allTrends = await loadData();

        <code style="background:#f5f5f5;padding:8px 14px;border-radius:8px;font-size:12px">npx serve .</code>
      </div>`;
  }
})();
