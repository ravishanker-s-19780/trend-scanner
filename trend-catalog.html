<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Trend Catalog — B2B Ladies Nighty Trends</title>
<style>
/* ── Variables ──────────────────────────────────── */
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e8e8e8;
  --text: #111111;
  --text-muted: #666666;
  --text-light: #999999;
  --accent: #e91e63;
  --accent-dark: #c2185b;
  --accent-light: #fce4ec;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.16);
  --header-h: 56px;
  --filter-h: 48px;
  --bottom-nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Decision colors */
  --send-now: #16a34a;
  --send-now-bg: #dcfce7;
  --backup: #2563eb;
  --backup-bg: #dbeafe;
  --needs-evidence: #d97706;
  --needs-evidence-bg: #fef3c7;
  --do-not-send: #dc2626;
  --do-not-send-bg: #fee2e2;
}

/* ── Reset ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ── Loading screen ─────────────────────────────── */
#loader {
  position: fixed; inset: 0;
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
}
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { color: var(--text-muted); font-size: 14px; font-weight: 500; }
#loader.hidden { display: none; }

/* ── Header ─────────────────────────────────────── */
header {
  position: sticky;
  top: 0; z-index: 100;
  height: var(--header-h);
  background: rgba(255,255,255,.92);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  height: 100%;
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 16px; letter-spacing: -.02em; flex-shrink: 0;
}
.brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #9c27b0);
  display: grid; place-items: center;
  font-size: 15px;
}
.header-tabs {
  display: flex; gap: 4px;
  background: var(--bg);
  border-radius: 999px;
  padding: 3px;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px; font-weight: 600;
  color: var(--text-muted);
  transition: all .15s ease;
  position: relative;
  white-space: nowrap;
}
.tab-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.wishlist-badge {
  display: none;
  position: absolute; top: -2px; right: -2px;
  background: var(--accent);
  color: white;
  font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px;
  border-radius: 999px; padding: 0 4px;
  align-items: center; justify-content: center;
  border: 2px solid var(--surface);
}
.wishlist-badge.visible { display: flex; }
.header-count {
  font-size: 12px; color: var(--text-muted); font-weight: 500; flex-shrink: 0;
}

/* ── Filter Bar ─────────────────────────────────── */
.filter-bar {
  position: sticky;
  top: var(--header-h); z-index: 90;
  background: rgba(245,245,245,.95);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  height: var(--filter-h);
}
.filter-scroll {
  max-width: 1200px; margin: 0 auto;
  height: 100%;
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 12px; font-weight: 600;
  transition: all .15s ease;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--text-muted); color: var(--text); }
.filter-chip.active {
  background: var(--text);
  border-color: var(--text);
  color: white;
}
.filter-chip.active.send-now { background: var(--send-now); border-color: var(--send-now); }
.filter-chip.active.backup { background: var(--backup); border-color: var(--backup); }
.filter-divider {
  flex-shrink: 0;
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 2px;
}

/* ── Main / Grid ────────────────────────────────── */
main {
  max-width: 1200px; margin: 0 auto;
  padding: 12px 10px calc(var(--bottom-nav-h) + var(--safe-bottom) + 20px);
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (min-width: 480px) {
  .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
}
@media (min-width: 768px) {
  main { padding: 16px 16px 80px; }
  .grid { grid-template-columns: repeat(4, 1fr); gap: 14px; }
}
@media (min-width: 1024px) {
  .grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
}

/* ── Trend Card ─────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  cursor: pointer;
  position: relative;
  display: flex; flex-direction: column;
}
.card:active { transform: scale(0.97); }
.card.disliked { opacity: 0.45; }
@media (hover: hover) {
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
}

/* Hero image */
.collage {
  position: relative;
  overflow: hidden;
  background: #f0f0f0;
  aspect-ratio: 2/3;
}
.hero-img {
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center top;
  transition: transform .5s ease;
  display: block;
  background: #f9f6f2;
}
.card:hover .hero-img { transform: scale(1.04); }
.hero-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #f5f0ff, #fce4ec);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}

/* Photos badge (desktop grid) */
.photos-badge {
  position: absolute; bottom: 36px; right: 8px; z-index: 5;
  background: rgba(0,0,0,.5);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  color: white; font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
}
@media (max-width: 767px) { .photos-badge { display: none; } }

/* Image dots indicator */
.img-dots {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; z-index: 5;
}
.img-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,.5);
  transition: background .2s;
}
.img-dot.active { background: white; }

/* Overlays on collage */
.rank-badge {
  position: absolute; top: 8px; left: 8px; z-index: 5;
  background: rgba(0,0,0,.6);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  color: white;
  font-size: 10px; font-weight: 700;
  padding: 3px 7px; border-radius: 999px;
  letter-spacing: .02em;
}
.decision-badge {
  position: absolute; top: 8px; right: 8px; z-index: 5;
  font-size: 9px; font-weight: 800;
  padding: 3px 7px; border-radius: 999px;
  letter-spacing: .04em; text-transform: uppercase;
}
.decision-badge.send-now { background: var(--send-now-bg); color: var(--send-now); }
.decision-badge.backup { background: var(--backup-bg); color: var(--backup); }
.decision-badge.needs-evidence { background: var(--needs-evidence-bg); color: var(--needs-evidence); }
.decision-badge.do-not-send { background: var(--do-not-send-bg); color: var(--do-not-send); }

/* Color DNA strip */
.color-strip {
  display: flex; height: 4px;
  overflow: hidden;
}
.color-strip span { flex: 1; }

/* Card body */
.card-body {
  padding: 10px 10px 8px;
  display: flex; flex-direction: column; gap: 5px;
  flex: 1;
}

/* Attribute pills */
.card-attrs {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px;
}
.attr-pill {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 999px; background: var(--bg); color: var(--text-muted);
  border: 1px solid var(--border);
}
.attr-pill.nursing { color: #7c3aed; border-color: #ede9fe; background: #ede9fe; }
.attr-pill.plus    { color: #2563eb; border-color: #dbeafe; background: #dbeafe; }

/* Fabric type badges with color coding */
.attr-pill.fabric-cotton { color: #92400e; background: #fef3c7; border-color: #fcd34d; }
.attr-pill.fabric-silk   { color: #7c2d12; background: #fed7aa; border-color: #fdba74; }
.attr-pill.fabric-satin  { color: #4c0519; background: #fbcfe8; border-color: #f472b6; }
.attr-pill.fabric-poly   { color: #1e1b4b; background: #e0e7ff; border-color: #c7d2fe; }
.attr-pill.fabric-rayon  { color: #164e63; background: #cffafe; border-color: #a5f3fc; }
.attr-pill.fabric-generic { color: var(--text-muted); background: var(--bg); border-color: var(--border); }
.card-title {
  font-size: 12px; font-weight: 700;
  line-height: 1.35; letter-spacing: -.01em;
  color: var(--text);
}
@media (min-width: 480px) { .card-title { font-size: 13px; } }

.card-meta {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.card-rating {
  display: flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600; color: #f59e0b;
}
.card-price {
  font-size: 11px; font-weight: 600; color: var(--text);
}
.card-count {
  font-size: 10px; color: var(--text-muted); margin-left: auto;
}

/* Platform dots */
.platform-dots {
  display: flex; gap: 3px; flex-wrap: wrap; align-items: center;
}
.platform-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  title: attr(data-platform);
}

/* Fire score */
.fire-row {
  display: flex; align-items: center; justify-content: space-between;
}
.fire-score { font-size: 12px; letter-spacing: .02em; }
.score-num {
  font-size: 10px; color: var(--text-muted);
  font-weight: 600;
}

/* Action row */
.action-row {
  display: flex; align-items: center;
  gap: 4px;
  padding: 6px 10px 8px;
  border-top: 1px solid var(--border);
}
.action-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  transition: all .15s ease;
  min-height: 34px;
}
.action-btn:hover, .action-btn:active { background: var(--bg); }
.action-btn.liked { color: var(--accent); }
.action-btn.wishlisted { color: #7c3aed; }
.action-btn.disliked-state { color: var(--text-muted); }
.action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.action-btn.liked svg.heart-icon { fill: var(--accent); stroke: var(--accent); }
.action-btn.wishlisted svg.bookmark-icon { fill: #7c3aed; stroke: #7c3aed; }

/* Like animation */
@keyframes heartPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.5); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); }
}
.heart-pop { animation: heartPop .35s ease forwards; }

/* ── Empty state ────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted); display: none;
}
.empty-state.visible { display: block; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 14px; }

/* ── Bottom Nav (mobile) ────────────────────────── */
.bottom-nav {
  display: flex;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(255,255,255,.95);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  z-index: 80;
}
@media (min-width: 768px) { .bottom-nav { display: none; } }
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  transition: color .15s ease;
  position: relative;
}
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { width: 22px; height: 22px; }
.bottom-nav-badge {
  display: none;
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: var(--accent); color: white;
  font-size: 9px; font-weight: 800;
  min-width: 16px; height: 16px;
  border-radius: 999px; padding: 0 3px;
  align-items: center; justify-content: center;
  border: 2px solid var(--surface);
}
.bottom-nav-badge.visible { display: flex; }

/* ── Scroll to top ──────────────────────────────── */
#scrollTop {
  position: fixed; right: 16px;
  bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--text);
  color: white;
  display: none; place-items: center;
  box-shadow: var(--shadow-md);
  z-index: 75; transition: opacity .2s ease;
}
#scrollTop.visible { display: grid; }
@media (min-width: 768px) {
  #scrollTop { bottom: 24px; }
}

/* ── Modal ──────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
  padding: 0;
}
.modal-overlay.open { display: flex; }
@media (min-width: 600px) {
  .modal-overlay { align-items: center; padding: 20px; }
}
.modal {
  background: var(--surface);
  width: 100%; max-width: 520px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  max-height: 92vh; overflow-y: auto;
  overscroll-behavior: contain;
  animation: slideUp .25s ease;
}
@media (min-width: 600px) {
  .modal { border-radius: var(--radius-lg); max-height: 88vh; }
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Modal drag handle */
.modal-handle {
  display: flex; justify-content: center; padding: 10px 0 6px;
}
.modal-handle span {
  width: 36px; height: 4px;
  background: var(--border); border-radius: 999px;
}
@media (min-width: 600px) { .modal-handle { display: none; } }

/* Modal images */
.modal-images {
  display: flex; gap: 6px;
  padding: 0 14px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.modal-images::-webkit-scrollbar { display: none; }
.modal-img-wrap {
  flex-shrink: 0;
  width: 120px; height: 160px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: #f0f0f0;
  position: relative;
}
.modal-img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
}
.modal-img-wrap .placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #ccc;
}

/* Modal body */
.modal-body { padding: 0 16px 24px; }
.modal-decision-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.modal-decision-badge {
  font-size: 11px; font-weight: 800;
  padding: 4px 10px; border-radius: 999px;
  text-transform: uppercase; letter-spacing: .04em;
}
.modal-title {
  font-size: 20px; font-weight: 800;
  letter-spacing: -.02em; margin-bottom: 6px;
  line-height: 1.2;
}
.modal-subtitle {
  font-size: 13px; color: var(--text-muted); margin-bottom: 16px;
}

/* Score breakdown */
.score-section { margin-bottom: 16px; }
.score-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted);
  margin-bottom: 10px;
}
.score-total-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.score-total-num {
  font-size: 28px; font-weight: 800; letter-spacing: -.03em;
}
.score-total-denom { font-size: 14px; color: var(--text-muted); font-weight: 500; }
.score-bars { display: flex; flex-direction: column; gap: 6px; }
.score-row {
  display: flex; align-items: center; gap: 8px;
}
.score-label { font-size: 11px; font-weight: 600; color: var(--text-muted); width: 140px; flex-shrink: 0; }
.score-bar-track {
  flex: 1; height: 6px;
  background: var(--bg); border-radius: 999px; overflow: hidden;
}
.score-bar-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), #9c27b0);
  transition: width .5s ease;
}
.score-val { font-size: 11px; font-weight: 700; width: 20px; text-align: right; flex-shrink: 0; }

/* Stats grid */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.stat-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.stat-value { font-size: 16px; font-weight: 800; letter-spacing: -.01em; }
.stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

/* Platform list */
.platform-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

/* Feature tags */
.feature-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.feature-tag {
  font-size: 12px; font-weight: 700; padding: 5px 12px;
  border-radius: 999px; background: var(--bg); color: var(--text-muted);
}
.feature-tag.nursing { background: #ede9fe; color: #7c3aed; }
.feature-tag.plus    { background: #dbeafe; color: #2563eb; }
.platform-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 999px;
  background: var(--bg);
  font-size: 11px; font-weight: 700; color: var(--text);
}
.platform-pill-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Color palette */
.color-palette { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
  position: relative;
}
.color-swatch::after {
  content: attr(data-name);
  position: absolute; top: 34px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; color: var(--text-muted); white-space: nowrap;
  pointer-events: none;
}

/* Modal action row */
.modal-actions {
  display: flex; gap: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.modal-action-btn {
  flex: 1; padding: 12px 8px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s ease;
  min-height: 44px;
}
.modal-action-btn.like-btn { background: var(--accent-light); color: var(--accent); }
.modal-action-btn.like-btn:hover { background: var(--accent); color: white; }
.modal-action-btn.like-btn.active { background: var(--accent); color: white; }
.modal-action-btn.wishlist-btn { background: #ede9fe; color: #7c3aed; }
.modal-action-btn.wishlist-btn:hover { background: #7c3aed; color: white; }
.modal-action-btn.wishlist-btn.active { background: #7c3aed; color: white; }
.modal-action-btn.skip-btn { background: var(--bg); color: var(--text-muted); }
.modal-action-btn.skip-btn.active { background: #f1f5f9; color: #64748b; }
.modal-action-btn svg { width: 18px; height: 18px; }

/* Modal close */
.modal-close-row {
  display: flex; justify-content: flex-end; padding: 12px 14px 0;
}
.modal-close-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg); display: grid; place-items: center;
  color: var(--text-muted);
  font-size: 18px; line-height: 1;
  display: none;
}
@media (min-width: 600px) { .modal-close-btn { display: grid; } }

/* ════════════════════════════════════════════════
   MOBILE: Full-screen vertical snap-scroll feed
   ════════════════════════════════════════════════ */
@media (max-width: 767px) {
  /* Lock body scroll — only the feed scrolls */
  body { overflow: hidden; height: 100dvh; }

  /* Feed container: fixed, fills between header+filter and bottom nav */
  main {
    position: fixed;
    top: calc(var(--header-h) + var(--filter-h));
    left: 0; right: 0;
    bottom: calc(var(--bottom-nav-h) + var(--safe-bottom));
    padding: 0;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    overscroll-behavior-y: none;
  }

  .grid {
    display: block;
    gap: 0;
  }

  /* Each card = one full screen */
  .card {
    scroll-snap-align: start;
    height: calc(100dvh - var(--header-h) - var(--filter-h) - var(--bottom-nav-h) - var(--safe-bottom));
    border-radius: 0;
    box-shadow: none;
    border: none;
    position: relative;
    overflow: hidden;
    transform: none !important;
  }
  .card:active { transform: none !important; }

  /* Image fills entire card */
  .collage {
    position: absolute;
    inset: 0;
    aspect-ratio: unset;
    z-index: 0;
  }

  /* Bottom gradient for readability */
  .collage::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,.80) 0%,
      rgba(0,0,0,.40) 35%,
      rgba(0,0,0,.10) 60%,
      transparent 80%
    );
    z-index: 2;
    pointer-events: none;
  }

  .hero-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* Rank badge: stay top-left */
  .rank-badge { z-index: 5; }

  /* Decision badge: stay top-right */
  .decision-badge { z-index: 5; }

  /* Dots: above gradient */
  .img-dots { z-index: 5; bottom: 12px; }

  /* Color DNA strip: pinned at very bottom */
  .color-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    z-index: 6;
  }

  /* Info panel: bottom-left overlay on image */
  .card-body {
    position: absolute;
    bottom: 5px; left: 0;
    right: 72px; /* leave space for right FABs */
    z-index: 5;
    padding: 14px 16px 20px;
    gap: 6px;
    background: none;
    flex: unset;
  }

  .card-title {
    color: white;
    font-size: 16px;
    font-weight: 800;
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
    line-height: 1.25;
  }

  .card-meta { gap: 8px; }
  .card-rating { color: #fbbf24; font-size: 13px; font-weight: 700; }
  .card-price { color: white; font-size: 13px; font-weight: 700; }
  .card-count { color: rgba(255,255,255,.7); font-size: 11px; margin-left: 0; }

  .fire-row { margin-top: 2px; }
  .fire-score { font-size: 16px; }

  .platform-dots .platform-dot {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(255,255,255,.5);
  }

  /* Right-side action FABs: TikTok/Reels style */
  .action-row {
    position: absolute;
    right: 12px;
    bottom: 40px;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border: none;
    padding: 0;
    z-index: 5;
    background: none;
  }

  .action-btn {
    flex: unset;
    flex-direction: column;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(0,0,0,.35);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 10px;
    font-weight: 700;
    gap: 3px;
    padding: 0;
    border: 1.5px solid rgba(255,255,255,.2);
    min-height: unset;
    justify-content: center;
  }
  .action-btn svg { width: 20px; height: 20px; }
  .action-btn:hover, .action-btn:active {
    background: rgba(0,0,0,.55);
  }
  .action-btn.liked {
    background: rgba(233,30,99,.55);
    border-color: var(--accent);
    color: white;
  }
  .action-btn.liked svg.heart-icon { fill: white; stroke: white; }
  .action-btn.wishlisted {
    background: rgba(124,58,237,.55);
    border-color: #7c3aed;
    color: white;
  }
  .action-btn.wishlisted svg.bookmark-icon { fill: white; stroke: white; }

  /* Swipe hint on first card */
  .swipe-hint {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: rgba(255,255,255,.7);
    font-size: 11px; font-weight: 600;
    animation: swipeBounce 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  .swipe-hint svg { width: 20px; height: 20px; }
  @keyframes swipeBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: .7; }
    50% { transform: translateX(-50%) translateY(-6px); opacity: 1; }
  }

  /* Hide scroll-to-top on mobile (feed handles navigation) */
  #scrollTop { display: none !important; }

  /* Attribute pills on mobile: white text, semi-transparent bg */
  .attr-pill {
    background: rgba(0,0,0,.35) !important;
    border-color: rgba(255,255,255,.2) !important;
    color: white !important;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .attr-pill.nursing { background: rgba(124,58,237,.55) !important; }
  .attr-pill.plus    { background: rgba(37,99,235,.55) !important; }
  .attr-pill.fabric-cotton { background: rgba(146,64,14,.6) !important; }
  .attr-pill.fabric-silk   { background: rgba(124,45,18,.6) !important; }
  .attr-pill.fabric-satin  { background: rgba(76,5,25,.6) !important; }
  .attr-pill.fabric-poly   { background: rgba(30,27,75,.6) !important; }
  .attr-pill.fabric-rayon  { background: rgba(22,78,99,.6) !important; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading trend data…</div>

<!-- Header -->
<header>
  <div class="header-inner">

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleModalOverlayClick(event)">

        <div class="score-section-title">Why this trend? 🔍</div>

          <div>
            <span class="score-total-num" id="modalScoreTotal"></span>
            <span class="score-total-denom"> / 25</span>
          </div>
          <div id="modalFireScore" style="font-size:22px;"></div>
        </div>
        <div class="score-bars" id="modalScoreBars"></div>
      </div>

      <div class="stats-grid" id="modalStats"></div>

      <div class="score-section-title" style="margin-bottom:8px;">Popular Colours 🎨</div>

<script>
// ── Constants ──────────────────────────────────────────────────
const PLATFORM_COLORS = {
  amazon:   '#FF9900',
  myntra:   '#FF3F6C',
  meesho:   '#9B2335',
  flipkart: '#2874F0',
  ajio:     '#F28A2E',
  clovia:   '#E91E7A',
  shyaway:  '#8B0000',
  tatacliq: '#942F82',
};

const DECISION_CLASS = {
  'Send Now':           'send-now',
  'Send as Backup':     'backup',
  'Needs More Evidence':'needs-evidence',
  'Do Not Send':        'do-not-send',
};

// Consumer-friendly labels mapped from internal B2B decision keys
const DECISION_LABEL = {
  'Send Now':            '🔥 High Demand',
  'Send as Backup':      '📈 Rising',
  'Needs More Evidence': '👀 Emerging',
  'Do Not Send':         '❌ Low Demand',
};

const DECISION_COLOR = {
  'Send Now':            'var(--send-now)',
  'Send as Backup':      'var(--backup)',
  'Needs More Evidence': 'var(--needs-evidence)',
  'Do Not Send':         'var(--do-not-send)',
};

const COLOR_MAP = {
  white: '#ffffff', cream: '#FFFDD0', peach: '#FFCBA4',
  pink: '#FFB6C1', 'light pink': '#FFB6C1', 'hot pink': '#FF69B4',
  red: '#e53935', 'dark red': '#b71c1c', maroon: '#800000',
  blue: '#1565c0', 'light blue': '#64b5f6', 'navy blue': '#001f5b', navy: '#001f5b',
  green: '#2e7d32', 'light green': '#81c784', 'dark green': '#1b5e20',
  yellow: '#f9a825', 'mustard yellow': '#e6a817', mustard: '#e6a817',
  orange: '#ef6c00', purple: '#7b1fa2', lavender: '#9575cd',
  grey: '#9e9e9e', gray: '#9e9e9e', black: '#212121',
  'sky blue': '#87ceeb', teal: '#009688', aqua: '#00bcd4',
  multicolor: 'linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff)',
};

const SCORE_LABELS = [
  ['A', 'Evidence Strength', 'evidence_strength'],
  ['B', 'Trend Signal',       'trend_signal'],
  ['C', 'TN B2B Fit',         'tn_b2b_fit'],
  ['D', 'Production',         'production_simplicity'],
  ['E', 'Margin',             'margin_possibility'],
];

// ── State ──────────────────────────────────────────────────────
let allTrends = [];
let activeTab = 'discover';
let activeFilters = { decision: 'all', pattern: 'all', sleeve: 'all' };
let currentModalKey = null;

function getState() {
  return {
    reactions: JSON.parse(localStorage.getItem('trend_reactions') || '{}'),
    wishlist:  JSON.parse(localStorage.getItem('trend_wishlist')  || '[]'),
  };
}
function saveState(s) {
  localStorage.setItem('trend_reactions', JSON.stringify(s.reactions));
  localStorage.setItem('trend_wishlist',  JSON.stringify(s.wishlist));
}

// ── Helpers ────────────────────────────────────────────────────
function fireMeter(score) {
  const n = score >= 20 ? 5 : score >= 15 ? 4 : score >= 10 ? 3 : score >= 5 ? 2 : 1;
  return '🔥'.repeat(n);
}

function topColors(colors, limit = 6) {
  const freq = {};
  colors.forEach(c => {
    const k = (c.primary || '').toLowerCase().trim();
    if (k && k !== 'unknown' && k !== 'none') freq[k] = (freq[k] || 0) + 1;
  });
  return Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit)
    .map(([name]) => name);
}

function colorCss(name) {
  if (!name) return '#e0e0e0';
  const k = name.toLowerCase().trim();
  return COLOR_MAP[k] || '#e0e0e0';
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1).replace(/-/g, ' ');
}

function formatTitle(t) {
  // Format: Material Half-Sleeve Round Neck - Plain Design Nighty
  if (!t) return 'Nighty';

  const material = dominantFabric(t.sampleProducts) || 'Cotton';

  const sleeveName = {
    'half': 'Half-Sleeve',
    'sleeveless': 'Sleeveless',
    'three-quarter': '3/4-Sleeve',
    '3/4': '3/4-Sleeve',
    'full': 'Full-Sleeve'
  };

  const neckName = {
    'round': 'Round Neck',
    'v-neck': 'V-Neck',
    'square': 'Square Neck',
    'sweetheart': 'Sweetheart Neck'
  };

  const sleeve = sleeveName[(t.sleeve_length || '').toLowerCase()] || capitalize(t.sleeve_length) + '-Sleeve' || 'Half-Sleeve';
  const neck = neckName[(t.neck_type || '').toLowerCase()] || capitalize(t.neck_type) + ' Neck' || 'Round Neck';

  let design = 'Plain';
  if (t.front_top_treatment && t.front_top_treatment.toLowerCase() !== 'plain') {
    design = capitalize(t.front_top_treatment);
  }

  return `${material} ${sleeve} ${neck} - ${design} Design Nighty`;
}

function formatSubtitle(t) {
  const parts = [];
  if (t.front_top_treatment && t.front_top_treatment !== 'plain') {
    parts.push(capitalize(t.front_top_treatment) + ' treatment');
  }
  if (t.keyword_count > 1) parts.push(`${t.keyword_count} keyword matches`);
  return parts.join(' · ') || 'Design cluster';
}

function dominantFabric(sampleProducts) {
  if (!sampleProducts || !Array.isArray(sampleProducts) || sampleProducts.length === 0) return 'Cotton';
  const freq = {};
  sampleProducts.forEach(p => {
    if (!p) return;
    let fabric = (p.fabric_resolved || '').toLowerCase().trim();
    if (fabric && fabric !== 'none') {
      fabric = fabric.replace(/^100%?\s*/, '').replace(/^\s*100\s*/, '').trim();
      if (fabric) freq[fabric] = (freq[fabric] || 0) + 1;
    }
  });
  const top = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];
  return top ? capitalize(top[0]) : 'Cotton';
}

function hasNursing(sampleProducts) {
  if (!sampleProducts || !Array.isArray(sampleProducts)) return false;
  return sampleProducts.some(p => p && p.nursing_label && p.nursing_label !== 'None');
}

function hasPlusSizes(sampleProducts) {
  if (!sampleProducts || !Array.isArray(sampleProducts)) return false;
  return sampleProducts.some(p => p && p.has_plus_sizes === true);
}

function fabricBadgeClass(fabric) {
  if (!fabric) return 'fabric-generic';
  const f = fabric.toLowerCase();
  if (f.includes('cotton')) return 'fabric-cotton';
  if (f.includes('silk')) return 'fabric-silk';
  if (f.includes('satin')) return 'fabric-satin';
  if (f.includes('polyester') || f.includes('poly')) return 'fabric-poly';
  if (f.includes('rayon') || f.includes('modal')) return 'fabric-rayon';
  return 'fabric-generic';
}

function getFabricFromPersonaTags(personaTags) {
  // Extract fabric info from persona tags array
  if (!personaTags || !Array.isArray(personaTags)) return null;
  for (const tag of personaTags) {
    if (Array.isArray(tag) && tag.length >= 2) {
      const label = tag[1];
      if (label.includes('Cotton') || label.includes('Fabric')) {
        return label;
      }
    }
  }
  return null;
}

// ── Data loading ───────────────────────────────────────────────
async function loadData() {
  const [data, products] = await Promise.all([
    fetch('evidence/output/trends.json').then(r => r.json()),
    fetch('evidence/clean/_merged.json').then(r => r.json()),
  ]);
  const trends = data.top_trends || data;
  const byId = Object.fromEntries(products.map(p => [p.product_id, p]));

  return trends.map((t, idx) => {
    const clusterKey = `${t.design_pattern}_${t.neck_type}_${t.sleeve_length}_${t.front_top_treatment}`;

    // Enrich sample_products with full data from _merged.json
    const enriched = t.sample_products?.map(sp => {
      const full = byId[sp.product_id] || {};
      return { ...sp, ...full };
    }) || [];

    const prices = enriched.map(p => p.price || 0).filter(p => p > 0);
    const ratings = enriched.map(p => p.rating || 0).filter(p => p > 0);

    return {
      ...t,
      rank: t.rank || (idx + 1),
      cluster_key: clusterKey,
      images: enriched.map(p => p.image).filter(Boolean),
      min_price: prices.length > 0 ? Math.min(...prices) : 0,
      max_price: prices.length > 0 ? Math.max(...prices) : 0,
      avg_price: prices.length > 0 ? prices.reduce((a, b) => a + b) / prices.length : 0,
      avg_rating: ratings.length > 0 ? ratings.reduce((a, b) => a + b) / ratings.length : 0,
      colors: enriched.flatMap(p => [
        { primary: p.primary_color },
        { primary: p.secondary_color }
      ]).filter(c => c.primary),
      sampleProducts: enriched,
    };
  });
}

// ── Render ─────────────────────────────────────────────────────
function heroImageHTML(images) {
  if (images.length === 0) {
    return `<div class="hero-placeholder">👗</div>`;
  }
  const dots = images.length > 1
    ? `<div class="img-dots">${images.map((_, i) =>
        `<span class="img-dot${i === 0 ? ' active' : ''}"></span>`
      ).join('')}</div>`
    : '';
  return `<img class="hero-img" src="${images[0]}" alt="Product" loading="lazy"
    onerror="this.outerHTML='<div class=\\'hero-placeholder\\'>👗</div>'"/>
    ${dots}`;
}

// Track current image index per card for swipe navigation
const cardImgIndex = {};

function renderCard(t, state) {
  const dc = DECISION_CLASS[t.decision] || 'do-not-send';
  const liked      = state.reactions[t.cluster_key] === 'like';
  const disliked   = state.reactions[t.cluster_key] === 'dislike';
  const wishlisted = state.wishlist.includes(t.cluster_key);

  const colors = topColors(t.colors, 5);
  const colorStrip = colors.map(c => {
    const css = colorCss(c);
    const bg = css.startsWith('linear') ? `background:${css}` : `background-color:${css}`;
    return `<span style="${bg}"></span>`;
  }).join('');

  const platformDots = Object.entries(t.sources).map(([p]) => {
    const col = PLATFORM_COLORS[p] || '#999';
    return `<span class="platform-dot" style="background:${col}" title="${p}"></span>`;
  }).join('');

  const ratingStr     = t.avg_rating ? t.avg_rating.toFixed(1) : '';
  const priceStr      = t.min_price  ? `₹${Math.round(t.min_price)}–₹${Math.round(t.max_price)}` : '';
  const decisionLabel = DECISION_LABEL[t.decision] || t.decision;

  // "N photos" badge on image (desktop only; mobile uses dots)
  const swipeHint = t.images.length > 1
    ? `<span class="photos-badge">${t.images.length} photos</span>`
    : '';

  // Swipe-up hint on very first card (mobile)
  const swipeUpHint = t.rank === 1
    ? `<div class="swipe-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        Swipe up
       </div>`
    : '';

  return `
  <div class="card${disliked ? ' disliked' : ''}"
    data-key="${t.cluster_key}"
    data-imgidx="0"
    onclick="handleCardClick(event,'${t.cluster_key}')">
    <div class="collage">
      ${heroImageHTML(t.images)}
      ${swipeHint}
      ${swipeUpHint}
      <span class="rank-badge">#${t.rank}</span>
      <span class="decision-badge ${dc}">${decisionLabel}</span>
    </div>
    <div class="color-strip">${colorStrip}</div>
    <div class="card-body">
      <div class="card-title">${formatTitle(t)}</div>
      <div class="card-meta">
        ${ratingStr ? `<span class="card-rating">⭐ ${ratingStr}</span>` : ''}
        ${priceStr  ? `<span class="card-price">${priceStr}</span>` : ''}
        <span class="card-count">${t.product_count} styles</span>
      </div>
      <div class="card-attrs">
        ${getFabricFromPersonaTags(t.persona_tags) ? `<span class="attr-pill ${fabricBadgeClass(getFabricFromPersonaTags(t.persona_tags))}">🧵 ${getFabricFromPersonaTags(t.persona_tags)}</span>` : (dominantFabric(t.sampleProducts) ? `<span class="attr-pill ${fabricBadgeClass(dominantFabric(t.sampleProducts))}">🧵 ${dominantFabric(t.sampleProducts)}</span>` : '')}
        ${hasNursing(t.sampleProducts) ? `<span class="attr-pill nursing">Nursing-Friendly ✓</span>` : ''}
        ${hasPlusSizes(t.sampleProducts) ? `<span class="attr-pill plus">📏 Plus</span>` : ''}
      </div>
      <div class="fire-row">
        <div class="fire-score">${fireMeter(t.score.total)}</div>
        <div class="platform-dots">${platformDots}</div>
      </div>
    </div>
    <div class="action-row">
      <button class="action-btn${liked ? ' liked' : ''}"
        onclick="toggleLike(event,'${t.cluster_key}')" title="Like">
        <svg class="heart-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Like
      </button>
      <button class="action-btn${disliked ? ' disliked-state' : ''}"
        onclick="toggleDislike(event,'${t.cluster_key}')" title="Skip">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Skip
      </button>
      <button class="action-btn${wishlisted ? ' wishlisted' : ''}"
        onclick="toggleWishlist(event,'${t.cluster_key}')" title="Save">
        <svg class="bookmark-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        Save
      </button>
    </div>
  </div>`;
}

function getFilteredList() {
  const state = getState();
  let list = [...allTrends];

  if (activeTab === 'wishlist') {
    list = list.filter(t => state.wishlist.includes(t.cluster_key));
  } else {
    if (activeFilters.decision !== 'all') {
      list = list.filter(t => t.decision === activeFilters.decision);
    }
    if (activeFilters.pattern !== 'all') {
      list = list.filter(t => t.design_pattern === activeFilters.pattern);
    }
    if (activeFilters.sleeve !== 'all') {
      list = list.filter(t => t.sleeve_length === activeFilters.sleeve);
    }
  }
  return list;
}

function renderGrid() {
  const state = getState();
  const list = getFilteredList();
  const grid = document.getElementById('trendGrid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('headerCount');

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('visible');
    count.textContent = '';
  } else {
    empty.classList.remove('visible');
    grid.innerHTML = list.map(t => renderCard(t, state)).join('');
    count.textContent = `${list.length} trends`;
  }

  updateBadges();
}

// ── Filters & tabs ─────────────────────────────────────────────
function setFilter(type, val, btn) {
  // Update active chip in same group
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(c => {
    c.classList.remove('active');
    // re-apply send-now/backup class for styling
  });
  btn.classList.add('active');
  activeFilters[type] = val;
  renderGrid();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.bottom-nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderGrid();
}

function updateBadges() {
  const { wishlist } = getState();
  const n = wishlist.length;
  const headerBadge = document.getElementById('headerWishlistBadge');
  const bottomBadge = document.getElementById('bottomWishlistBadge');
  if (n > 0) {
    headerBadge.textContent = n; headerBadge.classList.add('visible');
    bottomBadge.textContent = n; bottomBadge.classList.add('visible');
  } else {
    headerBadge.classList.remove('visible');
    bottomBadge.classList.remove('visible');
  }
}

// ── Card interactions ──────────────────────────────────────────
function handleCardClick(e, key) {
  if (e.target.closest('.action-btn')) return;
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;

  // Tap on image area cycles through photos; tap on card body opens modal
  if (e.target.closest('.collage') && t.images.length > 1) {
    const card = e.currentTarget;
    let idx = parseInt(card.dataset.imgidx || '0');
    idx = (idx + 1) % t.images.length;
    card.dataset.imgidx = idx;
    const heroImg = card.querySelector('.hero-img');
    if (heroImg) {
      heroImg.style.opacity = '0';
      heroImg.style.transition = 'opacity .15s';
      setTimeout(() => {
        heroImg.src = t.images[idx];
        heroImg.style.opacity = '1';
      }, 150);
    }
    // Update dots
    card.querySelectorAll('.img-dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });
    return;
  }

  openModal(t);
}

function toggleLike(e, key) {
  e.stopPropagation();
  const s = getState();
  if (s.reactions[key] === 'like') {
    delete s.reactions[key];
  } else {
    s.reactions[key] = 'like';
  }
  saveState(s);

  // Animate
  const card = document.querySelector(`[data-key="${key}"]`);
  if (card) {
    const heartBtn = card.querySelector('.action-btn:first-child');
    const heartSvg = heartBtn?.querySelector('.heart-icon');
    heartSvg?.classList.add('heart-pop');
    setTimeout(() => heartSvg?.classList.remove('heart-pop'), 400);
  }

  refreshCard(key);
  if (currentModalKey === key) refreshModalActions(key);
}

function toggleDislike(e, key) {
  e.stopPropagation();
  const s = getState();
  if (s.reactions[key] === 'dislike') {
    delete s.reactions[key];
  } else {
    s.reactions[key] = 'dislike';
  }
  saveState(s);
  refreshCard(key);
  if (currentModalKey === key) refreshModalActions(key);
}

function toggleWishlist(e, key) {
  if (e) e.stopPropagation();
  const s = getState();
  const idx = s.wishlist.indexOf(key);
  if (idx >= 0) {
    s.wishlist.splice(idx, 1);
  } else {
    s.wishlist.push(key);
  }
  saveState(s);
  refreshCard(key);
  updateBadges();
  if (currentModalKey === key) refreshModalActions(key);
  // If on wishlist tab and we just removed, re-render
  if (activeTab === 'wishlist') renderGrid();
}

function refreshCard(key) {
  const el = document.querySelector(`[data-key="${key}"]`);
  if (!el) return;
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;
  const state = getState();
  const newCard = document.createElement('div');
  newCard.innerHTML = renderCard(t, state).trim();
  const cardEl = newCard.firstChild;
  el.replaceWith(cardEl);
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(t) {
  currentModalKey = t.cluster_key;
  const state = getState();

  // Images
  const imagesEl = document.getElementById('modalImages');
  if (t.images.length > 0) {
    imagesEl.innerHTML = t.images.map(src =>
      `<div class="modal-img-wrap">
        <img src="${src}" alt="Product" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>👗</div>'"/>
      </div>`
    ).join('');
  } else {
    imagesEl.innerHTML = `<div class="modal-img-wrap"><div class="placeholder">👗</div></div>`;
  }

  // Decision badge — use friendly label
  const dc = DECISION_CLASS[t.decision] || 'do-not-send';
  const badge = document.getElementById('modalDecisionBadge');
  badge.className = `modal-decision-badge ${dc}`;
  badge.textContent = DECISION_LABEL[t.decision] || t.decision;

  document.getElementById('modalRank').textContent = `Trend #${t.rank}`;
  document.getElementById('modalTitle').textContent = formatTitle(t);
  document.getElementById('modalSubtitle').textContent = `${t.product_count} styles found across ${Object.keys(t.sources).length} platforms`;

  // Score — label as "Why this trend?"
  document.getElementById('modalScoreTotal').textContent = t.score.total;
  document.getElementById('modalFireScore').textContent = fireMeter(t.score.total);
  const barsEl = document.getElementById('modalScoreBars');
  const friendlyLabels = [
    ['Market Coverage',   'evidence_strength', 'How widely available across platforms'],
    ['Buyer Demand',      'trend_signal',       'Based on ratings and keyword popularity'],
    ['Price Fit',         'tn_b2b_fit',         'Fits wholesale price range (under ₹600)'],
    ['Easy to Source',    'production_simplicity', 'Simple design — faster delivery'],
    ['Profit Potential',  'margin_possibility', 'Room for margin at retail price'],
  ];
  barsEl.innerHTML = friendlyLabels.map(([label, key, hint]) => {
    const val = t.score[key] || 0;
    const pct = (val / 5) * 100;
    return `<div class="score-row" title="${hint}">
      <div class="score-label">${label}</div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div>
      <div class="score-val">${val}/5</div>
    </div>`;
  }).join('');

  // Stats
  const statsEl = document.getElementById('modalStats');
  const avgPrice = t.avg_price ? `₹${Math.round(t.avg_price)}` : '—';
  const priceRange = t.min_price ? `₹${Math.round(t.min_price)}–${Math.round(t.max_price)}` : '—';
  const rating = t.avg_rating ? t.avg_rating.toFixed(1) : '—';
  const fabric = dominantFabric(t.sampleProducts) || '—';
  const plusSizes = hasPlusSizes(t.sampleProducts) ? 'Yes' : 'No';
  statsEl.innerHTML = [
    ['Styles Found', t.product_count, `across ${Object.keys(t.sources).length} platforms`],
    ['Buyer Rating', `★ ${rating}`, 'average out of 5.0'],
    ['Price Range',  priceRange, `avg ${avgPrice}`],
    ['Fabric', fabric, 'primary material'],
    ['Plus Sizes', plusSizes, 'available in cluster'],
    ['Trend Score',  `${fireMeter(t.score.total)}`, `${t.score.total} / 25`],
  ].map(([label, val, sub]) =>
    `<div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${val}</div>
      <div class="stat-sub">${sub}</div>
    </div>`
  ).join('');

  // Colors
  const colorsEl = document.getElementById('modalColors');
  const palette = topColors(t.colors, 8);
  colorsEl.innerHTML = palette.map(name => {
    const css = colorCss(name);
    const bg = css.startsWith('linear') ? `background:${css}` : `background-color:${css}`;
    const border = name === 'white' ? 'border:1.5px solid #e0e0e0' : '';
    return `<div class="color-swatch" style="${bg};${border}" data-name="${name}" title="${name}"></div>`;
  }).join('');

  // Platforms
  const plEl = document.getElementById('modalPlatforms');
  plEl.innerHTML = Object.entries(t.sources).map(([p, count]) => {
    const col = PLATFORM_COLORS[p] || '#999';
    return `<div class="platform-pill">
      <span class="platform-pill-dot" style="background:${col}"></span>
      ${capitalize(p)} <span style="color:var(--text-muted);font-weight:500">(${count})</span>
    </div>`;
  }).join('');

  // Special features section
  const nursing = hasNursing(t.sampleProducts);
  const plusSz = hasPlusSizes(t.sampleProducts);
  if (nursing || plusSz) {
    const featureTags = [];
    if (nursing) featureTags.push('<span class="feature-tag nursing">👶 Nursing-Friendly</span>');
    if (plusSz) featureTags.push('<span class="feature-tag plus">📏 Plus Sizes Available</span>');
    const featuresHtml = `
      <div class="score-section-title" style="margin-bottom:8px;">Special Features ✨</div>
      <div class="feature-tags">${featureTags.join('')}</div>
    `;
    plEl.insertAdjacentHTML('afterend', featuresHtml);
  }

  refreshModalActions(t.cluster_key);

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function refreshModalActions(key) {
  const s = getState();
  const liked     = s.reactions[key] === 'like';
  const disliked  = s.reactions[key] === 'dislike';
  const wishlisted = s.wishlist.includes(key);

  document.getElementById('modalActions').innerHTML = `
    <button class="modal-action-btn like-btn ${liked ? 'active' : ''}"
      onclick="toggleLike(event,'${key}')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="${liked ? 'currentColor' : 'none'}" stroke-linecap="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      ${liked ? 'Liked!' : 'Like'}
    </button>
    <button class="modal-action-btn wishlist-btn ${wishlisted ? 'active' : ''}"
      onclick="toggleWishlist(event,'${key}')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="${wishlisted ? 'currentColor' : 'none'}" stroke-linecap="round">
        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      ${wishlisted ? 'Saved!' : 'Save'}
    </button>
    <button class="modal-action-btn skip-btn ${disliked ? 'active' : ''}"
      onclick="toggleDislike(event,'${key}')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      ${disliked ? 'Skipped' : 'Skip'}
    </button>
  `;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  currentModalKey = null;
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// ── Export ─────────────────────────────────────────────────────
function exportWishlist() {
  const { wishlist, reactions } = getState();
  const items = allTrends.filter(t => wishlist.includes(t.cluster_key)).map(t => ({
    rank: t.rank,
    cluster: t.cluster_key,
    title: formatTitle(t),
    decision: t.decision,
    score: t.score.total,
    avg_price: t.avg_price,
    min_price: t.min_price,
    max_price: t.max_price,
    avg_rating: t.avg_rating,
    product_count: t.product_count,
    sources: t.sources,
    reaction: reactions[t.cluster_key] || null,
  }));
  if (items.length === 0) {
    alert('No saved trends yet. Tap 🔖 on cards to save trends.');
    return;
  }
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'saved-trends.json';
  a.click(); URL.revokeObjectURL(url);
}

// ── Scroll to top button ───────────────────────────────────────
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
}, { passive: true });

// ── Keyboard ───────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
