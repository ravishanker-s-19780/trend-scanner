[build]
  command = "mkdir -p public/evidence/output && cp trend-catalog.html public/index.html && cp evidence/output/top-50-products-by-reviews.json public/evidence/output/top-50-products-by-reviews.json"
  publish = "public"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/evidence/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=60"
