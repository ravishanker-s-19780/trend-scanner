<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>B2B Nighty Trend Discovery — TrendBoard</title>
  <style>
/* ── Variables ──────────────────────────────── */
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e8e8e8;
  --text: #111111;
  --text-muted: #666666;
  --text-light: #999999;
  --accent: #e91e63;
  --accent-dark: #c2185b;
  --accent-light: #fce4ec;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.16);
  --header-h: 56px;
  --bottom-nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  --send-now: #16a34a;
  --send-now-bg: #dcfce7;
  --backup: #2563eb;
  --backup-bg: #dbeafe;
  --needs-evidence: #d97706;
  --needs-evidence-bg: #fef3c7;
  --do-not-send: #dc2626;
  --do-not-send-bg: #fee2e2;
}

/* ── Reset ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border-width: 0;
}

/* ── Loading screen ─────────────────────────── */
#loader {
  position: fixed; inset: 0;
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
}
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { color: var(--text-muted); font-size: 14px; font-weight: 500; }
#loader.hidden { display: none; }

/* ── Header ─────────────────────────────────── */
header {
  position: sticky;
  top: 0; z-index: 100;
  height: var(--header-h);
  background: rgba(255,255,255,.92);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  height: 100%;
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 16px; letter-spacing: -.02em; flex-shrink: 0;
}
.brand-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #9c27b0);
  display: grid; place-items: center;
  font-size: 15px;
}
.shortlist-header-btn {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: var(--accent-light);
  color: var(--accent);
  display: flex; gap: 6px; align-items: center;
}
.wishlist-badge {
  background: var(--accent);
  color: white;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 700;
  display: none;
}
.wishlist-badge.visible { display: grid; }

/* ── Main feed container ────────────────────── */
main {
  max-width: 1200px;
  margin: 0 auto;
  min-height: calc(100vh - var(--header-h) - var(--bottom-nav-h));
  padding: 0;
}

#feedContainer {
  max-width: 480px;
  margin: 0 auto;
  padding: 0;
}

/* ── Feed card ──────────────────────────────── */
.card {
  position: relative;
  overflow: hidden;
  margin: 0;
  border-radius: 0;
  border: none;
  background: var(--surface);
}

.card article {
  position: relative;
  overflow: hidden;
  margin: 0 auto;
  height: 100%;
}

.collage {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: #000;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

.hero-placeholder {
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
  background: #f0f0f0;
  font-size: 48px;
}

.collage::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    to top,
    rgba(0,0,0,.80) 0%,
    rgba(0,0,0,.40) 35%,
    rgba(0,0,0,.10) 60%,
    transparent 80%
  );
  z-index: 2;
  pointer-events: none;
}

.rank-badge {
  position: absolute;
  top: 12px; left: 12px;
  z-index: 5;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(8px);
  color: white;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}

.decision-badge {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 5;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 700;
  display: flex; align-items: center; gap: 4px;
  backdrop-filter: blur(8px);
}

.decision-badge.send-now {
  background: rgba(22, 163, 74, .9);
  color: white;
}
.decision-badge.backup {
  background: rgba(37, 99, 235, .9);
  color: white;
}
.decision-badge.needs-evidence {
  background: rgba(217, 119, 6, .9);
  color: white;
}
.decision-badge.do-not-send {
  background: rgba(220, 38, 38, .9);
  color: white;
}

.color-strip {
  display: flex;
  height: 5px;
  gap: 0;
}
.color-strip span {
  flex: 1;
}

.card-body {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px;
  background: var(--surface);
  min-height: 160px;
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.3;
  margin: 0;
  color: var(--text);
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}

.evidence-overlay {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  line-height: 1.4;
}

.action-hint {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin: 4px 0;
  letter-spacing: 0.02em;
}

.why-btn {
  background: rgba(233, 30, 99, .15);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 600;
  align-self: flex-start;
  margin: 4px 0;
}

.action-row {
  display: flex;
  gap: 8px;
  padding: 8px 0 0;
  justify-content: flex-end;
}

.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 10px;
  border-radius: 8px;
  background: var(--bg);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.action-btn:hover {
  background: var(--border);
  color: var(--text);
}

.action-btn.liked {
  color: var(--accent);
  background: var(--accent-light);
}

.action-btn.wishlisted {
  color: #7c3aed;
  background: #ede9fe;
}

/* ── Bottom nav ─────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--bottom-nav-h);
  background: rgba(255,255,255,.92);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  backdrop-filter: saturate(180%) blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 99;
  padding-bottom: var(--safe-bottom);
}

.bottom-nav button {
  flex: 1;
  padding: 8px 4px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
}

.bottom-nav button.active {
  color: var(--accent);
}

.bottom-nav-badge {
  background: var(--accent);
  color: white;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 9px;
  font-weight: 700;
  position: absolute;
  top: -2px;
  right: -2px;
  display: none;
}

.bottom-nav-badge.visible {
  display: grid;
}

/* ── Modal / Bottom Sheet ───────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  display: none;
  align-items: flex-end;
  z-index: 200;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  width: 100%;
  max-width: 520px;
  border-radius: 18px 18px 0 0;
  background: var(--surface);
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 -4px 32px rgba(0,0,0,.15);
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 0;
}

.modal-handle span {
  width: 32px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
}

.modal-close-row {
  display: none;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  justify-content: space-between;
  align-items: center;
}

.modal-close-btn {
  font-size: 24px;
  color: var(--text-muted);
  padding: 4px;
  margin-left: auto;
}

.modal-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin: 0;
  color: var(--text);
}

.modal-subtitle {
  font-size: 13px;
  color: var(--text-muted);
}

.score-section {
  padding: 12px;
  background: var(--bg);
  border-radius: 8px;
}

.score-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.score-total-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}

.score-total-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}

.score-total-denom {
  font-size: 14px;
  color: var(--text-muted);
}

.score-bars {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.score-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.score-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  width: 120px;
  text-align: right;
}

.score-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.score-fill {
  height: 100%;
  background: var(--accent);
}

.score-val {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  width: 20px;
}

.color-palette {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.platform-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.platform-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
}

.platform-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.trust-section {
  padding: 12px;
  background: var(--bg);
  border-radius: 8px;
}

.trust-toggle {
  cursor: pointer;
  user-select: none;
}

.trust-content {
  display: none;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

.trust-content.visible {
  display: block;
}

.modal-actions {
  display: flex;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.modal-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.modal-actions button:hover {
  background: var(--border);
  color: var(--text);
}

.modal-actions button.liked {
  background: var(--accent-light);
  color: var(--accent);
}

.modal-actions button.wishlisted {
  background: #ede9fe;
  color: #7c3aed;
}

/* ── Mobile snap-scroll (max 767px) ────────── */
@media (max-width: 767px) {
  body { overflow: hidden; height: 100dvh; }
  
  main {
    position: fixed;
    top: var(--header-h);
    left: 0;
    right: 0;
    bottom: calc(var(--bottom-nav-h) + var(--safe-bottom));
    padding: 0;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    overscroll-behavior-y: none;
  }
  
  #feedContainer {
    display: block;
    max-width: unset;
    margin: 0;
    gap: 0;
  }
  
  .card {
    scroll-snap-align: start;
    height: calc(100dvh - var(--header-h) - var(--bottom-nav-h) - var(--safe-bottom));
    border-radius: 0;
    box-shadow: none;
    border: none;
    position: relative;
    overflow: hidden;
  }
  
  .card article {
    height: 100%;
  }
  
  .collage {
    position: absolute;
    inset: 0;
    aspect-ratio: unset;
    z-index: 0;
  }
  
  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  
  .rank-badge { z-index: 5; }
  .decision-badge { z-index: 5; }
  
  .color-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    z-index: 6;
  }
  
  .card-body {
    position: absolute;
    bottom: 5px;
    left: 0;
    right: 60px;
    z-index: 5;
    padding: 14px 16px 20px;
    gap: 6px;
    background: none;
    min-height: auto;
  }
  
  .card-title {
    font-size: 16px;
    font-weight: 800;
    color: white;
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  
  .card-subtitle {
    color: rgba(255,255,255,.75);
    font-size: 12px;
  }
  
  .evidence-overlay {
    color: rgba(255,255,255,.8);
    font-size: 11px;
  }
  
  .action-hint {
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  
  .why-btn {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.35);
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,.3);
  }
  
  .action-row {
    position: absolute;
    right: 12px;
    bottom: 20px;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0;
    background: none;
    z-index: 5;
  }
  
  .action-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    padding: 0;
    background: rgba(0,0,0,.35);
    border: 1.5px solid rgba(255,255,255,.2);
    color: white;
    font-size: 10px;
    justify-content: center;
    min-height: unset;
    flex-direction: column;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  
  .action-btn:hover, .action-btn:active {
    background: rgba(0,0,0,.55);
  }
  
  .action-btn.liked {
    background: rgba(233, 30, 99, .55);
    border-color: var(--accent);
    color: white;
  }
  
  .action-btn.wishlisted {
    background: rgba(124, 58, 237, .55);
    border-color: #7c3aed;
    color: white;
  }
  
  .modal-handle { display: flex; }
  .modal-close-row { display: none; }
  .modal { border-radius: 18px 18px 0 0; }
}

@media (min-width: 600px) {
  .modal-overlay {
    align-items: center;
    justify-content: center;
  }
  
  .modal {
    width: 90%;
    max-width: 520px;
    border-radius: 18px;
    max-height: 88vh;
  }
  
  .modal-handle { display: none; }
  .modal-close-row { display: flex; }
}

@media (min-width: 768px) {
  main {
    min-height: calc(100vh - var(--header-h));
    padding: 16px 0 80px;
  }
  
  #feedContainer {
    max-width: 420px;
    margin: 0 auto;
  }
  
  .card {
    height: 640px;
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    box-shadow: var(--shadow-lg);
  }
  
  .card-body {
    position: relative;
    bottom: auto;
    left: auto;
    right: auto;
    z-index: auto;
    padding: 14px;
    background: var(--surface);
    min-height: auto;
  }
  
  .action-row {
    position: static;
    flex-direction: row;
    right: auto;
    bottom: auto;
    gap: 8px;
    padding: 8px 0 0;
    background: none;
  }
  
  .action-btn {
    width: auto;
    height: auto;
    border-radius: 8px;
    padding: 6px 10px;
    background: var(--bg);
    border: none;
    color: var(--text-muted);
    font-size: 10px;
    flex-direction: row;
  }
  
  .bottom-nav { display: none; }
  
  body { overflow-y: auto; }
}
  </style>
</head>
<body>
  <h1 class="sr-only">B2B Nighty Trend Discovery Feed</h1>
  
  <div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading trends…</div>
  </div>

  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">👗</div>
        TrendBoard
      </div>
      <button class="shortlist-header-btn" id="shortlistHeaderBtn" onclick="switchTab('wishlist')">
        Shortlist
        <span class="wishlist-badge" id="headerWishlistBadge"></span>
      </button>
    </div>
  </header>

  <main id="feedMain">
    <div id="feedContainer"></div>
  </main>

  <nav class="bottom-nav">
    <button data-tab="discover" onclick="switchTab('discover')" class="active">
      🔍 Discover
    </button>
    <button data-tab="wishlist" onclick="switchTab('wishlist')">
      🔖 Shortlist
      <span class="bottom-nav-badge" id="bottomWishlistBadge"></span>
    </button>
    <button onclick="exportWishlist()">
      ⬇ Export
    </button>
  </nav>

  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" onclick="handleModalOverlayClick(event)">
    <div class="modal" id="modalContent">
      <div class="modal-handle"><span></span></div>
      <div class="modal-close-row">
        <button class="modal-close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-subtitle" id="modalSubtitle"></div>
        
        <div class="score-section">
          <div class="score-section-title">Why this opportunity? 🔍</div>
          <div id="evidenceContent"></div>
        </div>
        
        <div id="modalActions"></div>
      </div>
    </div>
  </div>

  <script>

// ── Constants ──────────────────────────────────────────────────
const PLATFORM_COLORS = {
  amazon:   '#FF9900',
  myntra:   '#FF3F6C',
  meesho:   '#9B2335',
  flipkart: '#2874F0',
  ajio:     '#F28A2E',
  clovia:   '#E91E7A',
  shyaway:  '#8B0000',
  tatacliq: '#942F82',
};

const DECISION_CLASS = {
  'Trending Now':  'send-now',
  'Worth Watching':'backup',
  'Emerging':      'needs-evidence',
  'Niche':         'do-not-send',
};

const DECISION_LABEL = {
  'Trending Now':  '🟢 Buy / Produce Now',
  'Worth Watching':'🔵 Test Small Batch',
  'Emerging':      '🟡 Watch — Needs Evidence',
  'Niche':         '🔴 Do Not Send',
};


const COLOR_MAP = {
  white: '#ffffff', cream: '#FFFDD0', peach: '#FFCBA4',
  pink: '#FFB6C1', 'light pink': '#FFB6C1', 'hot pink': '#FF69B4',

const TITLE_MAP = {
  'Blockbuster': { plain: 'Fast-Moving Basic Nighty', floral: 'Best-Selling Floral Nighty', geometric: 'High-Demand Geometric Nighty', striped: 'Popular Striped Nighty', printed: 'Best-Selling Printed Nighty' },
  'High': { plain: 'Demand Winner Nighty', floral: 'Top-Selling Floral Nighty', geometric: 'Trending Geometric Style', striped: 'Rising Striped Style', printed: 'Trending Printed Style' },
  'Solid': { plain: 'Steady Basic Nighty', floral: 'Consistent Floral Style', geometric: 'Reliable Geometric Design', striped: 'Dependable Striped Nighty', printed: 'Consistent Printed Style' },
  'Emerging': { default: 'Fresh Find Nighty' },
  'Unproven': { default: 'Watch Only Style' }
};

function generateCustomerTrendTitle(t) {
  const demand = t.demand_label || 'Solid';
  const pattern = t.design_pattern || 'plain';
  const titleEntry = TITLE_MAP[demand] || TITLE_MAP['Solid'];
  return titleEntry[pattern] || titleEntry.default || 'Nighty Style';
}

function mapDecisionToCardType(t) {
  if (!t.confidence_tier || !t.risk_flags) return 'test-batch';
  const isHighConf = t.confidence_tier === 'High';
  const hasRisks = t.risk_flags.length > 0;
  const prodCount = t.product_count || 0;
  if (isHighConf && !hasRisks && prodCount >= 30) return 'buy-now';
  if (t.decision === 'Niche' || t.decision === 'Do Not Send' || hasRisks) return 'watch-only';
  if (t.confidence_tier === 'Low' || t.demand_label === 'Emerging' || t.demand_label === 'Unproven') return 'fresh-find';
  return 'test-batch';
}

function getCardTypeBadge(cardType, decision) {
  const badges = { 'buy-now': { icon: '🟢', text: 'Buy Now', class: 'send-now' }, 'test-batch': { icon: '🔵', text: 'Test Small Batch', class: 'backup' }, 'fresh-find': { icon: '✨', text: 'Fresh Find', class: 'needs-evidence' }, 'watch-only': { icon: '🟡', text: 'Watch Only', class: 'needs-evidence' } };
  if (decision === 'Do Not Send') return { icon: '🔴', text: 'Do Not Send', class: 'do-not-send' };
  return badges[cardType] || badges['test-batch'];
}

function actionHint(t, cardType) {
  const badge = getCardTypeBadge(cardType, t.decision);
  const tier = t.confidence_tier || 'Unknown';
  const qty = t.test_quantity || (
    cardType === 'buy-now'    ? 'Order 100+ pcs'
    : cardType === 'test-batch' ? 'Test 30–50 pcs'
    : cardType === 'fresh-find' ? 'Sample 5–10 pcs'
    : 'Monitor only'
  );
  return `${badge.icon} ${badge.text} · ${qty} · ${tier} Confidence`;
}

// ── Helpers ────────────────────────────────────────────────────
function fireMeter(score) {
  const n = score >= 20 ? 5 : score >= 15 ? 4 : score >= 10 ? 3 : score >= 5 ? 2 : 1;
  return '🔥'.repeat(n);
}

function topColors(colors, limit = 6) {
  const freq = {};
  colors.forEach(c => {
    const k = (c.primary || '').toLowerCase().trim();
    if (k && k !== 'unknown' && k !== 'none') freq[k] = (freq[k] || 0) + 1;
  });
  return Object.entries(freq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit)
    .map(([name]) => name);
}

function colorCss(name) {
  if (!name) return '#e0e0e0';
  const k = name.toLowerCase().trim();
  return COLOR_MAP[k] || '#e0e0e0';
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1).replace(/-/g, ' ');
}

const SLEEVE_LABELS = {
  'half':          'Half Sleeve',
  'full':          'Full Sleeve',
  'sleeveless':    'Sleeveless',
  'three-quarter': '¾ Sleeve',
};

function formatTitle(t) {
  const sleeve = t.sleeve_length ? (SLEEVE_LABELS[t.sleeve_length] || capitalize(t.sleeve_length) + ' Sleeve') : null;
  return sleeve ? [capitalize(t.design_pattern), sleeve].join(' · ') : capitalize(t.design_pattern);
}

function dominantNeck(t) {
  if (!t.neck_breakdown || Object.keys(t.neck_breakdown).length === 0) return null;
  return Object.entries(t.neck_breakdown).sort((a, b) => parseInt(b[1]) - parseInt(a[1]))[0][0];
}

function formatSubtitle(t) {
  const parts = [];
  if (t.front_top_treatment && t.front_top_treatment !== 'plain') {
    parts.push(capitalize(t.front_top_treatment) + ' treatment');
  }
  if (t.keyword_count > 1) parts.push(`${t.keyword_count} keyword matches`);
  return parts.join(' · ') || 'Design cluster';
}

// ── Render ─────────────────────────────────────────────────────
function heroImageHTML(images, startIndex = 0) {
  if (images.length === 0) {
    return `<div class="hero-placeholder">👗</div>`;
  }
  const selectedIdx = startIndex % Math.max(1, images.length);
  const dots = images.length > 1
    ? `<div class="img-dots">${images.map((_, i) =>
        `<span class="img-dot${i === selectedIdx ? ' active' : ''}"></span>`
      ).join('')}</div>`
    : '';
  return `<img class="hero-img" src="${images[selectedIdx]}" alt="Product" loading="lazy"
    onerror="this.outerHTML='<div class=\\'hero-placeholder\\'>👗</div>'"/>
    ${dots}`;
}

// Track current image index per card for swipe navigation
const cardImgIndex = {};

// ── Feed pipeline state ────────────────────────────────────────
let feedCursor = 0;
let allRanked = [];
let imageIdxOf = {};
let usedImageUrls = new Set();
let usedImageQueue = [];
let lastRenderedClusterKey = null;
let globalInstanceCounter = 0;
let poolCursor = { A: 0, B: 0, C: 0 };
let feedPatternIndex = 0;

function rememberImageUrl(url) {
  if (!url) return;
  usedImageUrls.add(url);
  usedImageQueue.push(url);
  if (usedImageQueue.length > 30) {
    usedImageUrls.delete(usedImageQueue.shift());
  }
}

function rankTrendOpportunities(trends) {
  const confOrder = { 'High': 0, 'Medium': 1, 'Low': 2 };
  return [...trends].sort((a, b) => {
    const cA = confOrder[a.confidence_tier] ?? 2;
    const cB = confOrder[b.confidence_tier] ?? 2;
    if (cA !== cB) return cA - cB;
    const rA = (a.risk_flags || []).length;
    const rB = (b.risk_flags || []).length;
    if (rA !== rB) return rA - rB;
    if (a.product_count !== b.product_count) return b.product_count - a.product_count;
    if (a.total_reviews !== b.total_reviews) return b.total_reviews - a.total_reviews;
    const pA = Object.keys(a.sources || {}).length;
    const pB = Object.keys(b.sources || {}).length;
    if (pA !== pB) return pB - pA;
    return (b.score?.total || 0) - (a.score?.total || 0);
  });
}

function buildInfiniteFeedItems(ranked, batchSize = 15) {
  const pools = { A: [], B: [], C: [] };
  ranked.forEach(t => {
    const ct = mapDecisionToCardType(t);
    if (ct === 'buy-now') pools.A.push(t);
    else if (ct === 'test-batch') pools.B.push(t);
    else pools.C.push(t);
  });

  const pattern = ['A','A','A','A','A','A','A','B','B','C'];
  const feed = [];

  while (feed.length < batchSize) {
    const slot = pattern[feedPatternIndex % 10];
    const pool = pools[slot];

    if (pool.length > 0) {
      let selectedTrend = null;
      let attempts = 0;
      const maxAttempts = pool.length * 2;

      // Try to find a trend not recently used (adjacent prevention)
      while (attempts < maxAttempts) {
        selectedTrend = pool[poolCursor[slot] % pool.length];
        if (selectedTrend.cluster_key !== lastRenderedClusterKey) break;
        poolCursor[slot]++;
        attempts++;
      }

      // Only proceed if we found a different cluster OR this is the first card
      if (selectedTrend && (selectedTrend.cluster_key !== lastRenderedClusterKey || feed.length === 0)) {
        // Skip clusters with no sample images
        const samples = selectedTrend.sample_images || [];
        if (samples.length === 0) {
          poolCursor[slot]++;
          feedPatternIndex++;
          continue;
        }

        // Get next image index for this cluster
        if (imageIdxOf[selectedTrend.cluster_key] == null) {
          imageIdxOf[selectedTrend.cluster_key] = 0;
        }
        let sampleIdx = imageIdxOf[selectedTrend.cluster_key] % samples.length;
        let sampleImage = samples[sampleIdx];

        // If this image is recently used and we have options, try next image
        if (usedImageUrls.has(sampleImage.url) && samples.length > 1) {
          imageIdxOf[selectedTrend.cluster_key]++;
          sampleIdx = imageIdxOf[selectedTrend.cluster_key] % samples.length;
          sampleImage = samples[sampleIdx];
        }

        // Push the card (use current image even if recently seen to avoid infinite loop)
        feed.push({
          trend: selectedTrend,
          sampleImage,
          sampleImageIndex: sampleIdx,
          instanceId: globalInstanceCounter++
        });
        rememberImageUrl(sampleImage.url);
        lastRenderedClusterKey = selectedTrend.cluster_key;
        imageIdxOf[selectedTrend.cluster_key]++;
      }
      poolCursor[slot]++;
    }
    feedPatternIndex++;
  }
  return feed;
}

function appendMoreFeedItems() {
  const batch = buildInfiniteFeedItems(allRanked, 15);
  const state = getState();
  const html = batch.map((feedItem) => renderCard(feedItem.trend, state, feedItem.sampleImageIndex, feedItem.instanceId, feedItem.sampleImage)).join('');
  document.getElementById('feedContainer').insertAdjacentHTML('beforeend', html);
  feedCursor += batch.length;
  setupScrollObserver();
}

function setupScrollObserver() {
  const lastCard = document.querySelector('#feedContainer .card:last-child');
  if (!lastCard || lastCard._observed) return;
  lastCard._observed = true;
  new IntersectionObserver((entries, obs) => {
    if (entries[0].isIntersecting) {
      obs.disconnect();
      appendMoreFeedItems();
    }
  }, { threshold: 0.3 }).observe(lastCard);
}

function openEvidenceSheet(e, key) {
  e.stopPropagation();
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;
  openModal(t);
}

function renderCard(t, state, heroImageIndex = 0, instanceId = null, sampleImage = null) {
  const dc = DECISION_CLASS[t.decision] || 'do-not-send';
  const liked      = state.reactions[t.cluster_key] === 'like';
  const disliked   = state.reactions[t.cluster_key] === 'dislike';
  const wishlisted = state.wishlist.includes(t.cluster_key);
  const cardType   = mapDecisionToCardType(t);

  const colors = topColors(t.colors, 5);
  const colorStrip = colors.map(c => {
    const css = colorCss(c);
    const bg = css.startsWith('linear') ? `background:${css}` : `background-color:${css}`;
    return `<span style="${bg}"></span>`;
  }).join('');

  const platformDots = Object.entries(t.sources).map(([p]) => {
    const col = PLATFORM_COLORS[p] || '#999';
    return `<span class="platform-dot" style="background:${col}" title="${p}"></span>`;
  }).join('');

  const ratingStr     = t.avg_rating ? t.avg_rating.toFixed(1) : '';
  const priceStr      = t.min_price  ? `₹${Math.round(t.min_price)}–₹${Math.round(t.max_price)}` : '';
  const decisionLabel = DECISION_LABEL[t.decision] || t.decision;

  // Use sampleImage if available, otherwise fall back to t.images
  const heroUrl = sampleImage ? sampleImage.url : (t.images || [])[heroImageIndex] || '';
  const heroAlt = sampleImage
    ? `${generateCustomerTrendTitle(t)} — ${sampleImage.source || ''}`
    : generateCustomerTrendTitle(t);

  // "N photos" badge on image (desktop only; mobile uses dots)
  const swipeHint = t.images.length > 1
    ? `<span class="photos-badge">${t.images.length} photos</span>`
    : '';

  // Swipe-up hint on very first card (mobile)
  const swipeUpHint = t.rank === 1
    ? `<div class="swipe-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        Swipe up
       </div>`
    : '';

  // Build product attribute tags (fabric, size, nursing)
  const topFabric = t.top_fabrics && t.top_fabrics.length > 0
    ? t.top_fabrics[0].replace(/\s*\(\d+\)/, '').trim()
    : null;
  const fabricTag = topFabric
    ? `<span class="tag tag-fabric">${topFabric}</span>`
    : '';

  const neck = dominantNeck(t);
  const neckTag = neck
    ? `<span class="tag tag-fabric">${capitalize(neck)} Neck</span>`
    : '';

  const sizeTag = t.has_plus_sizes
    ? `<span class="tag tag-size">Up to 3XL</span>`
    : '';

  const nursingTag = t.nursing_count > 0
    ? `<span class="tag tag-nursing">Nursing-friendly</span>`
    : '';

  const tagsHTML = (fabricTag || neckTag || sizeTag || nursingTag)
    ? `<div class="card-tags">${fabricTag}${neckTag}${sizeTag}${nursingTag}</div>`
    : '';

  const confidenceTier = t.confidence_tier || 'Unknown';
  const confidenceColor = confidenceTier === 'High' ? '#10b981'
    : confidenceTier === 'Medium' ? '#f59e0b'
    : confidenceTier === 'Low' ? '#f97316'
    : '#ef4444';
  const platformCount = Object.keys(t.sources).length;
  const confidenceRow = `
    <div class="confidence-row" style="display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid #f0f0f0; margin-top: 8px;">
      <span class="confidence-dot" style="width: 8px; height: 8px; border-radius: 50%; background: ${confidenceColor}; flex-shrink: 0;"></span>
      <span class="confidence-label" style="font-size: 12px; color: #666;">${confidenceTier} confidence · ${t.product_count} products · ${platformCount} platforms</span>
    </div>
  `;

  return `
  <article class="card${disliked ? ' disliked' : ''}"
    data-key="${t.cluster_key}"
    data-imgidx="${heroImageIndex}"
    data-instance-id="${instanceId}"
    onclick="handleCardClick(event,'${t.cluster_key}')">
    <div class="collage">
      ${sampleImage ? `<img class="hero-img" src="${heroUrl}" alt="${heroAlt}" loading="lazy" onerror="this.outerHTML='<div class=\\'hero-placeholder\\'>👗</div>'"/>` : heroImageHTML(t.images, heroImageIndex)}
      ${swipeHint}
      ${swipeUpHint}
      <span class="rank-badge">#${t.rank}</span>
      <span class="decision-badge ${dc}">${decisionLabel}</span>
    </div>
    <div class="color-strip">${colorStrip}</div>
    <div class="card-body">
      <h2 class="card-title" style="margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3;">${generateCustomerTrendTitle(t)}</h2>
      <div class="card-subtitle">${formatTitle(t)}</div>
      ${tagsHTML}
      <div class="evidence-overlay">${t.product_count} products · ${t.total_reviews.toLocaleString()} reviews · ${Object.keys(t.sources).length} platforms</div>
      <div class="action-hint">${actionHint(t, cardType)}</div>
    </div>
    <div class="action-row">
      <button class="action-btn"
        onclick="openEvidenceSheet(event,'${t.cluster_key}')" title="View evidence">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        Why?
      </button>
      <button class="action-btn${wishlisted ? ' wishlisted' : ''}"
        onclick="toggleWishlist(event,'${t.cluster_key}')" title="Shortlist">
        <svg class="bookmark-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        Shortlist
      </button>
      <button class="action-btn${disliked ? ' disliked-state' : ''}"
        onclick="toggleDislike(event,'${t.cluster_key}')" title="Reject">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Reject
      </button>
    </div>
  </article>`;
}

function renderFeed() {
  const container = document.getElementById('feedContainer');
  container.innerHTML = '';
  feedCursor = 0;
  imageIdxOf = {};
  usedImageUrls = new Set();
  usedImageQueue = [];
  lastRenderedClusterKey = null;
  globalInstanceCounter = 0;
  poolCursor = { A: 0, B: 0, C: 0 };
  feedPatternIndex = 0;
  const state = getState();

  if (activeTab === 'wishlist') {
    const items = allTrends.filter(t => state.wishlist.includes(t.cluster_key));
    container.innerHTML = items.map((t, i) => renderCard(t, state, 0, 'wishlist-' + i)).join('');
  } else {
    allRanked = rankTrendOpportunities(allTrends);
    appendMoreFeedItems();
  }
  updateBadges();
}

// ── Filters & tabs ─────────────────────────────────────────────
function setFilter(type, val, btn) {
  // Update active chip in same group
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(c => {
    c.classList.remove('active');
    // re-apply send-now/backup class for styling
  });
  btn.classList.add('active');
  activeFilters[type] = val;
  renderFeed();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderFeed();
}

function updateBadges() {
  const { wishlist } = getState();
  const n = wishlist.length;
  const headerBadge = document.getElementById('headerWishlistBadge');
  const bottomBadge = document.getElementById('bottomWishlistBadge');
  if (n > 0) {
    headerBadge.textContent = n; headerBadge.classList.add('visible');
    bottomBadge.textContent = n; bottomBadge.classList.add('visible');
  } else {
    headerBadge.classList.remove('visible');
    bottomBadge.classList.remove('visible');
  }
}

// ── Card interactions ──────────────────────────────────────────
function handleCardClick(e, key) {
  if (e.target.closest('.action-btn')) return;
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;

  // Tap on image area cycles through photos; tap on card body opens modal
  if (e.target.closest('.collage') && t.images.length > 1) {
    const card = e.currentTarget;
    let idx = parseInt(card.dataset.imgidx || '0');
    idx = (idx + 1) % t.images.length;
    card.dataset.imgidx = idx;
    const heroImg = card.querySelector('.hero-img');
    if (heroImg) {
      heroImg.style.opacity = '0';
      heroImg.style.transition = 'opacity .15s';
      setTimeout(() => {
        heroImg.src = t.images[idx];
        heroImg.style.opacity = '1';
      }, 150);
    }
    // Update dots
    card.querySelectorAll('.img-dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });
    return;
  }

  openModal(t);
}

function toggleLike(e, key) {
  e.stopPropagation();
  const s = getState();
  if (s.reactions[key] === 'like') {
    delete s.reactions[key];
  } else {
    s.reactions[key] = 'like';
  }
  saveState(s);

  // Animate
  const card = e.currentTarget.closest('.card');
  if (card) {
    const heartBtn = card.querySelector('.action-btn:first-child');
    const heartSvg = heartBtn?.querySelector('.heart-icon');
    heartSvg?.classList.add('heart-pop');
    setTimeout(() => heartSvg?.classList.remove('heart-pop'), 400);
  }

  refreshCardFromEvent(e, key);
  if (currentModalKey === key) refreshModalActions(key);
}

function toggleDislike(e, key) {
  e.stopPropagation();
  const s = getState();
  if (s.reactions[key] === 'dislike') {
    delete s.reactions[key];
  } else {
    s.reactions[key] = 'dislike';
  }
  saveState(s);
  refreshCardFromEvent(e, key);
  if (currentModalKey === key) refreshModalActions(key);
}

function toggleWishlist(e, key) {
  if (e) e.stopPropagation();
  const s = getState();
  const idx = s.wishlist.indexOf(key);
  if (idx >= 0) {
    s.wishlist.splice(idx, 1);
  } else {
    s.wishlist.push(key);
  }
  saveState(s);
  refreshCardFromEvent(e, key);
  updateBadges();
  if (currentModalKey === key) refreshModalActions(key);
  // If on wishlist tab and we just removed, re-render
  if (activeTab === 'wishlist') renderFeed();
}

function refreshCardFromEvent(e, key) {
  const el = e ? e.currentTarget.closest('.card') : document.querySelector(`[data-key="${key}"]`);
  if (!el) return;
  const t = allTrends.find(x => x.cluster_key === key);
  if (!t) return;
  const state = getState();
  const currentImgIdx = Number(el.dataset.imgidx || 0);
  const currentInstanceId = el.dataset.instanceId || null;
  const sampleImage = (t.sample_images || [])[currentImgIdx] || null;
  const newCard = document.createElement('div');
  newCard.innerHTML = renderCard(t, state, currentImgIdx, currentInstanceId, sampleImage).trim();
  el.replaceWith(newCard.firstChild);
}

function refreshCard(key) {
  refreshCardFromEvent(null, key);
}

// ── Modal ──────────────────────────────────────────────────────

  // Evidence content — B2B summary with key metrics

  const avgPrice = t.avg_price ? `₹${Math.round(t.avg_price)}` : '—';

  const rating = t.avg_rating ? t.avg_rating.toFixed(1) : '—';

  const neck = dominantNeck(t) || 'Various';
  const samples = t.sample_images || [];
  const sampleThumbs = samples.slice(0, 4).map(s =>
    `<img src="${s.url}" alt="Sample" style="width:48px;height:64px;object-fit:cover;border-radius:4px" loading="lazy" onerror="this.style.display='none'"/>`
  ).join('');

  document.getElementById('evidenceContent').innerHTML = `
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
      <div>
        <div style="font-size: 11px; color: #999; margin-bottom: 2px;">Recommendation</div>
        <div style="font-weight: 600; color: #111; font-size: 14px;">${recAction}</div>
      </div>
      <div>
        <div style="font-size: 11px; color: #999; margin-bottom: 2px;">Test Quantity</div>
        <div style="font-weight: 600; color: #111; font-size: 14px;">${testQty}</div>
      </div>
      <div>
        <div style="font-size: 11px; color: #999; margin-bottom: 2px;">Confidence</div>
        <div style="font-weight: 600; color: #111; font-size: 14px;">${confTier}</div>
      </div>
      <div>
        <div style="font-size: 11px; color: #999; margin-bottom: 2px;">Margin Tier</div>
        <div style="font-weight: 600; color: #111; font-size: 14px;">${marginTier}</div>
      </div>
    </div>

    <div style="border-top: 1px solid #e8e8e8; padding-top: 12px; margin-bottom: 12px;">
      <div style="font-size: 12px; margin-bottom: 8px;"><strong>Market Data</strong></div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px;">
        <div><span style="color: #666;">Avg Price:</span> <span style="font-weight: 600;">${avgPrice}</span></div>
        <div><span style="color: #666;">Range:</span> <span style="font-weight: 600;">${priceRange}</span></div>
        <div><span style="color: #666;">Rating:</span> <span style="font-weight: 600;">★ ${rating}</span></div>
        <div><span style="color: #666;">Neckline:</span> <span style="font-weight: 600;">${capitalize(neck)}</span></div>
      </div>
    </div>

    <div style="border-top: 1px solid #e8e8e8; padding-top: 12px; margin-bottom: 12px;">
      <div style="font-size: 12px; margin-bottom: 8px;"><strong>B2B Fit</strong></div>
      <div style="font-size: 13px; margin-bottom: 6px;"><span style="color: #666;">Buyers:</span> ${buyerSegment}</div>
      <div style="font-size: 13px; margin-bottom: 6px;"><span style="color: #666;">Season:</span> ${seasonFit}</div>
      <div style="font-size: 13px;"><span style="color: #666;">Risks:</span> ${riskFlags}</div>
    </div>

    ${sampleThumbs ? `<div style="border-top: 1px solid #e8e8e8; padding-top: 12px;">
      <div style="font-size: 12px; margin-bottom: 8px;"><strong>Sample Images</strong></div>
      <div style="display: flex; gap: 6px;">${sampleThumbs}</div>
    </div>` : ''}
  `;

  refreshModalActions(t.cluster_key);

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function refreshModalActions(key) {
  const s = getState();
  const liked     = s.reactions[key] === 'like';
  const disliked  = s.reactions[key] === 'dislike';
  const wishlisted = s.wishlist.includes(key);

  document.getElementById('modalActions').innerHTML = `
    <button class="modal-action-btn like-btn ${liked ? 'active' : ''}"
      onclick="toggleLike(event,'${key}')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="${liked ? 'currentColor' : 'none'}" stroke-linecap="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      ${liked ? 'Interested ✓' : 'Interested'}
    </button>
    <button class="modal-action-btn wishlist-btn ${wishlisted ? 'active' : ''}"
      onclick="toggleWishlist(event,'${key}')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="${wishlisted ? 'currentColor' : 'none'}" stroke-linecap="round">
        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      ${wishlisted ? 'Shortlist ✓' : 'Shortlist'}
    </button>
    <button class="modal-action-btn skip-btn ${disliked ? 'active' : ''}"
      onclick="toggleDislike(event,'${key}')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      ${disliked ? 'Reject ✓' : 'Reject'}
    </button>
  `;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  currentModalKey = null;
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// ── Export ─────────────────────────────────────────────────────
function exportWishlist() {
  const { wishlist, reactions } = getState();
  const items = allTrends.filter(t => wishlist.includes(t.cluster_key)).map(t => ({
    rank: t.rank,
    cluster: t.cluster_key,
    title: formatTitle(t),
    decision: t.decision,
    score: t.score.total,
    avg_price: t.avg_price,
    min_price: t.min_price,
    max_price: t.max_price,
    avg_rating: t.avg_rating,
    product_count: t.product_count,
    sources: t.sources,
    reaction: reactions[t.cluster_key] || null,
  }));
  if (items.length === 0) {
    alert('No shortlisted trends yet. Tap 🔖 on cards to shortlist trends.');
    return;
  }

  const format = confirm('Export as JSON (OK) or Text for WhatsApp (Cancel)?') ? 'json' : 'text';
  const today = new Date().toLocaleDateString('en-IN');

  if (format === 'json') {
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `shortlist-${today}.json`;
    a.click(); URL.revokeObjectURL(url);
  } else {
    let text = `📋 SHORTLISTED NIGHTY TRENDS\nGenerated: ${today}\n\n`;
    items.forEach((item, idx) => {
      text += `${idx + 1}. ${item.title}\n`;
      text += `   Action: ${item.decision}\n`;
      text += `   Score: ${item.score}/25\n`;
      text += `   Price: ₹${item.min_price}–₹${item.max_price} (avg ₹${item.avg_price})\n`;
      text += `   Rating: ${item.avg_rating ? item.avg_rating.toFixed(1) : 'N/A'} ⭐\n`;
      text += `   Found: ${item.product_count} styles\n\n`;
    });
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `shortlist-${today}.txt`;
    a.click(); URL.revokeObjectURL(url);
  }
}

// ── Scroll to top button ───────────────────────────────────────
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');

document.addEventListener('keydown', e => {

});
